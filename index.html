<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Guide</title>
  <meta name="color-scheme" content="light only" />
  <style>
    /* Minimal, Notion-like header and white/black palette */
    :root {
      --bg: #ffffff;
      --text: #111;
      --muted: #555;
      --border: #e5e5e5;
    }
    html, body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    .topbar { position: sticky; top:0; height:64px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; background:#fff; border-bottom:1px solid var(--border); }
    .brand { font-weight:700; font-size:1.05rem; }
    .menu { display:flex; gap:16px; }
    .menu a { color:#111; text-decoration:none; padding:6px 12px; border-radius:6px; }
    .menu a:hover { background:#f0f0f0; }
    .theme-toggle { border:1px solid var(--border); border-radius:6px; padding:6px 10px; background:#fff; cursor:pointer; }
    main { padding:0; min-height:60vh; }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html" style="font-weight:700; text-decoration:none; color:inherit;">Data Guide</a>
    <nav class="menu" aria-label="Main menu">
      <a href="#">Python</a>
      <a href="#">Pandas</a>
      <a href="#">NumPy</a>
      <a href="spark/index.html">Spark Portal</a>
      <a href="#">SQL</a>
    </nav>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">Light</button>
  </header>
  <main id="home"></main>
  <script>
    // Simple light/dark switcher
    const toggle = document.getElementById('theme-toggle');
    toggle?.addEventListener('click', () => {
      if (document.documentElement.style.colorScheme === 'dark') {
        document.documentElement.style.colorScheme = 'light';
        document.body.style.background = '#ffffff';
        toggle.textContent = 'Light';
      } else {
        document.documentElement.style.colorScheme = 'dark';
        document.body.style.background = '#000';
        toggle.textContent = 'Dark';
      }
    });
  </script>
</body>
</html>
