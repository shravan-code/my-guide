<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Tools Comparison | Cheatsheets</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=Fira+Code:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../sidebar.css">
    <style>
        main {
            width: min(1400px, calc(100% - 3rem));
            margin: 0 auto;
            padding: 1rem 0 3rem;
        }

        .hero {
            padding: 2rem 1.5rem;
            background: linear-gradient(135deg, var(--gradient-start, #667eea) 0%, var(--gradient-end, #764ba2) 100%);
            border-radius: 1.5rem;
            margin-bottom: 3rem;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .hero p {
            font-size: 1.1rem;
            opacity: 0.95;
            margin: 0;
        }

        .controls-section {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-filter);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .controls-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .column-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 0.75rem;
            background: transparent;
            transition: background-color 0.2s ease;
            cursor: pointer;
        }

        .checkbox-group:hover {
            background: var(--hover-bg);
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-color, #667eea);
        }

        .checkbox-group label {
            cursor: pointer;
            font-weight: 500;
            margin: 0;
            user-select: none;
        }

        .tool-icon {
            font-size: 1.2rem;
            margin: 0;
        }

        .comparison-container {
            display: grid;
            gap: 2rem;
        }

        .comparison-section {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-filter);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 2rem;
            overflow-x: auto;
        }

        .comparison-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-color);
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--accent-color);
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .comparison-table thead {
            background: var(--header-bg, rgba(102, 126, 234, 0.1));
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .comparison-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        .comparison-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
        }

        .comparison-table tbody tr:hover {
            background: var(--hover-bg);
        }

        .scenario-col {
            font-weight: 600;
            color: var(--text-color);
            min-width: 150px;
            background: var(--cell-bg);
        }

        .code-cell {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.05);
            padding: 1rem;
            border-radius: 0.5rem;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--code-color);
        }

        .tool-highlight {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .postgresql {
            color: #336791;
        }

        .pandas {
            color: #150458;
        }

        .numpy {
            color: #013243;
        }

        .pyspark {
            color: #E25A1C;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        body.dark .comparison-table thead {
            background: rgba(102, 126, 234, 0.15);
        }

        body.dark .code-cell {
            background: rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 1.8rem;
            }

            .column-selector {
                grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            }

            .comparison-table {
                font-size: 0.85rem;
            }

            .comparison-table th,
            .comparison-table td {
                padding: 0.75rem;
            }

            .code-cell {
                font-size: 0.75rem;
            }
        }
    </style>
</head>

    <main>
        <div class="hero">
            <h1>📊 Data Tools Comparison</h1>
            <p>Side-by-side reference for PostgreSQL, Pandas, NumPy, and PySpark</p>
        </div>

        <div class="controls-section">
            <div class="controls-title">
                🎯 Select Tools to Compare
            </div>
            <div class="column-selector">
                <div class="checkbox-group">
                    <input type="checkbox" id="postgresql" name="postgresql" checked>
                    <label for="postgresql">
                        <span class="tool-icon">🐘</span>
                        PostgreSQL
                    </label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="pandas" name="pandas" checked>
                    <label for="pandas">
                        <span class="tool-icon">🐼</span>
                        Pandas
                    </label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="numpy" name="numpy" checked>
                    <label for="numpy">
                        <span class="tool-icon">🔢</span>
                        NumPy
                    </label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="pyspark" name="pyspark" checked>
                    <label for="pyspark">
                        <span class="tool-icon">⚡</span>
                        PySpark
                    </label>
                </div>
            </div>
        </div>

        <div class="comparison-container" id="comparisonContainer"></div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">⚠️</div>
            <p>Please select at least one tool to compare</p>
        </div>
    </main>

    <script src="../app.js"></script>
    <script>
        // Comprehensive comparison data
        const comparisonData = [
            {
                category: "1. Setup & Connection",
                scenarios: [
                    {
                        scenario: "Connect to database / Initialize",
                        postgresql: "psql -U user -d database_name\n\nOr via Python:\nimport psycopg2\nconn = psycopg2.connect(\n  'dbname=db user=user password=pwd')",
                        pandas: "import pandas as pd\n\ndf = pd.read_csv('file.csv')\n# or from database:\ndf = pd.read_sql(query, conn)",
                        numpy: "import numpy as np\n\n# No persistent connection\n# Load from file:\narr = np.load('file.npy')\narr = np.loadtxt('file.csv', delimiter=',')",
                        pyspark: "from pyspark.sql import SparkSession\n\nspark = SparkSession.builder\\\n  .appName('app')\\\n  .getOrCreate()\n\ndf = spark.read.csv('file.csv', header=True)"
                    }
                ]
            },
            {
                category: "2. Data Inspection & Schema",
                scenarios: [
                    {
                        scenario: "Show table structure / Schema",
                        postgresql: "\\d table_name\n\nOr via SQL:\nSELECT * FROM information_schema.columns\nWHERE table_name = 'table_name';",
                        pandas: "df.info()\ndf.dtypes\ndf.columns\ndf.shape",
                        numpy: "arr.dtype\narr.shape\narr.ndim\narr.size",
                        pyspark: "df.printSchema()\ndf.dtypes\ndf.columns\ndf.show(n=5)"
                    },
                    {
                        scenario: "View first N rows",
                        postgresql: "SELECT * FROM tbl LIMIT 5;",
                        pandas: "df.head(5)\ndf.head()  # default 5",
                        numpy: "arr[:5]\narr[0:5]",
                        pyspark: "df.show(5)\ndf.limit(5).show()"
                    }
                ]
            },
            {
                category: "3. Filtering & Selection",
                scenarios: [
                    {
                        scenario: "Filter rows by condition",
                        postgresql: "SELECT * FROM tbl WHERE age > 30;",
                        pandas: "df[df.age > 30]\ndf.query('age > 30')",
                        numpy: "arr[arr[:,col_idx] > 30]\nBoolean mask: mask = arr > 30; arr[mask]",
                        pyspark: "from pyspark.sql.functions import col\ndf.filter(col('age') > 30)"
                    },
                    {
                        scenario: "Select specific columns",
                        postgresql: "SELECT name, salary FROM tbl;",
                        pandas: "df[['name', 'salary']]\ndf.loc[:, ['name', 'salary']]",
                        numpy: "arr[:, [0, 2]]\n# by index reference",
                        pyspark: "df.select('name', 'salary')\ndf.select(col('name'), col('salary'))"
                    }
                ]
            },
            {
                category: "4. Sorting",
                scenarios: [
                    {
                        scenario: "Sort rows",
                        postgresql: "SELECT * FROM tbl ORDER BY age DESC;",
                        pandas: "df.sort_values('age', ascending=False)\ndf.sort_values(['col1', 'col2'])",
                        numpy: "np.sort(arr)\narr[np.argsort(arr)]\n# for 2D:\narr[np.argsort(arr[:,0])]",
                        pyspark: "from pyspark.sql.functions import desc\ndf.orderBy(desc('age'))\ndf.orderBy('col1', desc('col2'))"
                    }
                ]
            },
            {
                category: "5. Aggregation & Group By",
                scenarios: [
                    {
                        scenario: "Count rows / Count groups",
                        postgresql: "SELECT COUNT(*) FROM tbl;\nSELECT dept, COUNT(*) FROM tbl GROUP BY dept;",
                        pandas: "len(df)\ndf.groupby('dept').size()\ndf.groupby('dept')['id'].count()",
                        numpy: "len(arr)\narr.shape[0]\nnp.bincount(arr)  # count unique values",
                        pyspark: "df.count()\ndf.groupBy('dept').count()\ndf.groupBy('dept').agg(count('*'))"
                    },
                    {
                        scenario: "Sum / Average / Min / Max",
                        postgresql: "SELECT SUM(salary), AVG(salary), MIN(salary), MAX(salary) FROM tbl;\nSELECT dept, AVG(salary) FROM tbl GROUP BY dept;",
                        pandas: "df.salary.sum()\ndf.salary.mean()\ndf.salary.min()\ndf.salary.max()\ndf.groupby('dept')['salary'].mean()",
                        numpy: "np.sum(arr)\nnp.mean(arr)\nnp.min(arr)\nnp.max(arr)\nnp.nanmean(arr)  # ignores NaN",
                        pyspark: "from pyspark.sql.functions import sum, avg, min, max\ndf.select(sum('salary'), avg('salary')).show()\ndf.groupBy('dept').agg(avg('salary'))"
                    }
                ]
            },
            {
                category: "6. Joins & Merges",
                scenarios: [
                    {
                        scenario: "Inner join",
                        postgresql: "SELECT t1.*, t2.* FROM t1 INNER JOIN t2 ON t1.id = t2.id;",
                        pandas: "pd.merge(df1, df2, on='id', how='inner')\ndf1.set_index('id').join(df2.set_index('id'), how='inner')",
                        numpy: "# Use Pandas or structured arrays\n# NumPy doesn't have join semantics",
                        pyspark: "df1.join(df2, 'id', 'inner')\ndf1.join(df2.select('id', 'col'), 'id')"
                    },
                    {
                        scenario: "Left join",
                        postgresql: "SELECT t1.*, t2.* FROM t1 LEFT JOIN t2 ON t1.id = t2.id;",
                        pandas: "pd.merge(df1, df2, on='id', how='left')",
                        numpy: "# Use Pandas or structured arrays",
                        pyspark: "df1.join(df2, 'id', 'left')"
                    }
                ]
            },
            {
                category: "7. Data Transformation & Column Operations",
                scenarios: [
                    {
                        scenario: "Add/Create new column",
                        postgresql: "ALTER TABLE tbl ADD COLUMN new_col INT;\nSELECT *, age*2 AS age_doubled FROM tbl;",
                        pandas: "df['new_col'] = value\ndf['age_doubled'] = df['age'] * 2\ndf.assign(new_col=value)",
                        numpy: "new_col = arr * 2\nnp.column_stack([arr, new_col])",
                        pyspark: "from pyspark.sql.functions import col, lit\ndf.withColumn('new_col', lit(value))\ndf.withColumn('age_doubled', col('age') * 2)"
                    },
                    {
                        scenario: "Drop column",
                        postgresql: "ALTER TABLE tbl DROP COLUMN old_col;",
                        pandas: "df.drop('col_name', axis=1)\ndf.drop(columns=['col1', 'col2'])",
                        numpy: "np.delete(arr, col_idx, axis=1)",
                        pyspark: "df.drop('col_name')\ndf.drop('col1', 'col2')"
                    },
                    {
                        scenario: "Rename column",
                        postgresql: "ALTER TABLE tbl RENAME COLUMN old_name TO new_name;",
                        pandas: "df.rename(columns={'old': 'new'})\ndf.rename({'old': 'new'}, axis=1)",
                        numpy: "# Use structured arrays or Pandas",
                        pyspark: "df.withColumnRenamed('old_name', 'new_name')"
                    }
                ]
            },
            {
                category: "8. String Operations",
                scenarios: [
                    {
                        scenario: "Convert to uppercase / lowercase",
                        postgresql: "SELECT UPPER(name), LOWER(name) FROM tbl;",
                        pandas: "df.name.str.upper()\ndf.name.str.lower()",
                        numpy: "np.char.upper(arr)\nnp.char.lower(arr)  # for char arrays",
                        pyspark: "from pyspark.sql.functions import upper, lower\ndf.select(upper('name'), lower('name'))"
                    },
                    {
                        scenario: "String length",
                        postgresql: "SELECT LENGTH(name), CHAR_LENGTH(name) FROM tbl;",
                        pandas: "df.name.str.len()",
                        numpy: "np.char.str_len(arr)",
                        pyspark: "from pyspark.sql.functions import length\ndf.select(length('name'))"
                    }
                ]
            },
            {
                category: "9. Date & Time Operations",
                scenarios: [
                    {
                        scenario: "Get current date/time",
                        postgresql: "SELECT CURRENT_DATE, CURRENT_TIMESTAMP;",
                        pandas: "pd.Timestamp.now()\npd.to_datetime('now')\nfrom datetime import datetime\ndatetime.now()",
                        numpy: "np.datetime64('now')",
                        pyspark: "from pyspark.sql.functions import current_date, current_timestamp\ndf.select(current_date(), current_timestamp())"
                    },
                    {
                        scenario: "Extract year/month/day",
                        postgresql: "SELECT EXTRACT(YEAR FROM date_col), EXTRACT(MONTH FROM date_col) FROM tbl;",
                        pandas: "df.date_col.dt.year\ndf.date_col.dt.month\ndf.date_col.dt.day",
                        numpy: "# Use DatetimeIndex from Pandas",
                        pyspark: "from pyspark.sql.functions import year, month, day\ndf.select(year('date_col'), month('date_col'))"
                    }
                ]
            },
            {
                category: "10. Window Functions",
                scenarios: [
                    {
                        scenario: "ROW_NUMBER / RANK",
                        postgresql: "SELECT *, ROW_NUMBER() OVER (ORDER BY salary DESC) AS rn FROM tbl;\nSELECT *, RANK() OVER (ORDER BY salary DESC) AS rnk FROM tbl;",
                        pandas: "df['rn'] = df.groupby().cumcount() + 1\ndf['rnk'] = df.salary.rank(ascending=False)",
                        numpy: "# Use argsort and other functions",
                        pyspark: "from pyspark.sql.functions import row_number, rank\nfrom pyspark.sql.window import Window\nw = Window.orderBy(desc('salary'))\ndf.withColumn('rn', row_number().over(w))\ndf.withColumn('rnk', rank().over(w))"
                    },
                    {
                        scenario: "FIRST_VALUE / LAST_VALUE",
                        postgresql: "SELECT *, FIRST_VALUE(sal) OVER (PARTITION BY dept ORDER BY id) AS first_sal FROM tbl;",
                        pandas: "df.groupby('dept')['sal'].transform('first')\ndf.groupby('dept')['sal'].transform('last')",
                        numpy: "# index 0 / -1 after group sort",
                        pyspark: "from pyspark.sql.functions import first, last\nw = Window.partitionBy('dept').orderBy('id')\ndf.withColumn('first', first('sal').over(w))\ndf.withColumn('last', last('sal').over(w))"
                    }
                ]
            },
            {
                category: "11. NumPy — Array Creation, Math & Linear Algebra",
                scenarios: [
                    {
                        scenario: "Create arrays",
                        postgresql: "-- N/A in SQL\n-- equivalent sets/series:\ngenerate_series(0,9)",
                        pandas: "pd.Series([1,2,3])\npd.Series(range(10))\nnp.arange(10)\n# use NumPy",
                        numpy: "np.array([1,2,3])\nnp.zeros((3,3))\nnp.ones((3,3))\nnp.eye(3)\nnp.arange(0,10,2)\nnp.linspace(0,1,5)",
                        pyspark: "from pyspark.ml.linalg import Vectors\nVectors.dense([1,2,3])\n# or DenseMatrix(nrow,ncol,vals)"
                    },
                    {
                        scenario: "Random arrays",
                        postgresql: "RANDOM()",
                        pandas: "pd.Series(np.random.randn(10))",
                        numpy: "np.random.seed(42)\nnp.random.rand(3,3)  # uniform [0,1)\nnp.random.randn(3,3)  # standard normal\nnp.random.randint(0,100,size=(3,3))\nnp.random.choice([1,2,3],size=5)",
                        pyspark: "# Use spark.range + rand()\nfrom pyspark.sql.functions import rand\nspark.range(100).select(rand())"
                    },
                    {
                        scenario: "Reshape / Transpose",
                        postgresql: "-- N/A",
                        pandas: "df.values.reshape(m,n)\ndf.T  # transpose DataFrame",
                        numpy: "arr.reshape(3,4)\narr.reshape(-1,1)  # column vector\narr.flatten()  # 1-D copy\narr.ravel()  # 1-D view\narr.T  # transpose",
                        pyspark: "-- DataFrames are tabular,\n-- Transposing is not typical"
                    },
                    {
                        scenario: "Element-wise arithmetic",
                        postgresql: "SELECT a+b, a-b, a*b, a/b FROM tbl;",
                        pandas: "df.a + df.b\ndf.a * df.b\ndf.a / df.b\ndf.a ** 2",
                        numpy: "arr1 + arr2\narr1 * arr2  # element-wise\narr ** 2     # square each element\nnp.sqrt(arr)\nnp.log(arr)\nnp.exp(arr)",
                        pyspark: "df.withColumn('c', col('a') + col('b'))"
                    },
                    {
                        scenario: "Matrix operations / Dot product",
                        postgresql: "-- N/A (SQL is row-based)",
                        pandas: "pd.DataFrame(np.dot(A.values, B.values))\nA.values @ B.values",
                        numpy: "np.dot(A, B)\nA @ B  # same as dot for 2-D\nnp.matmul(A, B)  # no scalar support\nnp.inner(a, b)  # inner product\nnp.outer(a, b)  # outer product",
                        pyspark: "# Use MLlib for matrix ops\nfrom pyspark.mllib.linalg.distributed import RowMatrix"
                    },
                    {
                        scenario: "Linear algebra operations",
                        postgresql: "-- N/A",
                        pandas: "# via numpy:\nimport numpy.linalg as la\nla.inv(df.values)",
                        numpy: "np.linalg.det(A)\nnp.linalg.inv(A)\nnp.linalg.eig(A)\nnp.linalg.svd(A)\nnp.linalg.norm(arr)\nnp.linalg.solve(A, b)",
                        pyspark: "from pyspark.ml.linalg import DenseMatrix\n# Spark ML: PCA, etc."
                    },
                    {
                        scenario: "Boolean masking / where",
                        postgresql: "SELECT * FROM tbl WHERE x > 0;\nSELECT CASE WHEN x>0 THEN x ELSE 0 END FROM tbl;",
                        pandas: "df[df.x > 0]\ndf.x.clip(lower=0)",
                        numpy: "arr[arr > 0]\nnp.where(arr>0, arr, 0)\nnp.clip(arr, 0, None)\nnp.ma.masked_where(arr<0, arr)",
                        pyspark: "df.filter(col('x') > 0)\ndf.withColumn('x', when(col('x')>0,col('x')).otherwise(0))"
                    },
                    {
                        scenario: "Statistical operations",
                        postgresql: "SELECT AVG(x), STDDEV(x), VARIANCE(x), PERCENTILE_CONT(0.5) WITHIN GROUP (ORDER BY x) FROM tbl;",
                        pandas: "df.x.mean()\ndf.x.std()\ndf.x.var()\ndf.x.median()\ndf.x.quantile(0.25)\ndf.x.skew()\ndf.x.kurt()",
                        numpy: "np.mean(arr)\nnp.std(arr)\nnp.var(arr)\nnp.median(arr)\nnp.percentile(arr,[25,50,75])\nnp.corrcoef(a, b)\nnp.cov(a, b)",
                        pyspark: "df.select(mean('x'), stddev('x'), variance('x'), skewness('x'), kurtosis('x')).show()"
                    }
                ]
            },
            {
                category: "12. Writing & Saving Data",
                scenarios: [
                    {
                        scenario: "Insert rows",
                        postgresql: "INSERT INTO tbl (a,b,c) VALUES (1,'x',2.0);\nINSERT INTO tbl SELECT * FROM src;",
                        pandas: "df.to_sql('tbl', conn, if_exists='append', index=False)",
                        numpy: "# write array to file:\nnp.save('file.npy', arr)",
                        pyspark: "df.write.mode('append').saveAsTable('tbl')\ndf.write.insertInto('tbl')"
                    },
                    {
                        scenario: "Update/overwrite rows",
                        postgresql: "UPDATE tbl SET salary=salary*1.1 WHERE dept='Eng';",
                        pandas: "df.loc[df.dept=='Eng', 'salary'] *= 1.1",
                        numpy: "arr[arr[:,2]==1, 1] *= 1.1",
                        pyspark: "# Spark DFs are immutable; create new:\ndf.withColumn('salary', when(col('dept')=='Eng', col('salary')*1.1).otherwise(col('salary')))"
                    },
                    {
                        scenario: "Delete / filter out rows",
                        postgresql: "DELETE FROM tbl WHERE dept='HR';",
                        pandas: "df = df[df.dept != 'HR']",
                        numpy: "mask = arr[:,col_idx] != val\narr = arr[mask]",
                        pyspark: "df = df.filter(col('dept')!='HR')"
                    },
                    {
                        scenario: "Write to CSV",
                        postgresql: "COPY tbl TO '/path/f.csv' WITH (FORMAT CSV, HEADER);",
                        pandas: "df.to_csv('file.csv', index=False)\ndf.to_csv('file.csv.gz', compression='gzip')",
                        numpy: "np.savetxt('file.csv', arr, delimiter=',', header='a,b,c', comments='')",
                        pyspark: "df.write.csv('path', header=True)\ndf.coalesce(1).write.csv('path')"
                    }
                ]
            }
        ];

        // Tool configuration
        const tools = {
            postgresql: { name: 'PostgreSQL', icon: '🐘', color: '#336791' },
            pandas: { name: 'Pandas', icon: '🐼', color: '#150458' },
            numpy: { name: 'NumPy', icon: '🔢', color: '#013243' },
            pyspark: { name: 'PySpark', icon: '⚡', color: '#E25A1C' }
        };

        // Initialize comparison on page load
        function initializeComparison() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.addEventListener('change', updateComparison);
            });
            updateComparison();
        }

        function updateComparison() {
            const selectedTools = [];
            document.querySelectorAll('input[type="checkbox"]:checked').forEach(checkbox => {
                selectedTools.push(checkbox.name);
            });

            const container = document.getElementById('comparisonContainer');
            const emptyState = document.getElementById('emptyState');

            if (selectedTools.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = '';

            comparisonData.forEach(section => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'comparison-section';
                sectionDiv.id = section.category.replace(/\s+/g, '-').toLowerCase();

                let html = `<h2 class="comparison-title">${section.category}</h2>`;

                section.scenarios.forEach(scenario => {
                    html += `
                        <table class="comparison-table">
                            <thead>
                                <tr>
                                    <th style="width: 150px;">Scenario</th>
                                    ${selectedTools.map(tool => `
                                        <th style="color: ${tools[tool].color};">
                                            ${tools[tool].icon} ${tools[tool].name}
                                        </th>
                                    `).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="scenario-col">${scenario.scenario}</td>
                                    ${selectedTools.map(tool => `
                                        <td class="code-cell">${(scenario[tool] || 'N/A').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</td>
                                    `).join('')}
                                </tr>
                            </tbody>
                        </table>
                    `;
                });

                sectionDiv.innerHTML = html;
                container.appendChild(sectionDiv);
            });
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initializeComparison);
    </script>
</body>

</html>
