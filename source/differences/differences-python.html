        definition: "In Python, all exceptions are errors, but the terms are often used interchangeably. Technically, <strong>errors</strong> are typically unrecoverable conditions (like <code>SyntaxError</code>, <code>MemoryError</code>) while <strong>exceptions</strong> are generally expected, recoverable events that can be caught with try/except. All exceptions inherit from <code>BaseException</code>.",
        internal_working: "Python's exception hierarchy: <code>BaseException</code> → <code>Exception</code> (recoverable) and <code>SystemExit</code>, <code>KeyboardInterrupt</code>, <code>GeneratorExit</code> (not typically caught). All user-defined exceptions should inherit from <code>Exception</code>. When an exception is raised, Python unwinds the call stack searching for a matching <code>except</code> clause.",
        use_case: "Catch recoverable exceptions (<code>ValueError</code>, <code>IOError</code>) to handle gracefully. Let <code>SystemExit</code> and <code>KeyboardInterrupt</code> propagate by not catching <code>BaseException</code>. Create custom exceptions for domain-specific errors: <code>class InsufficientFundsError(Exception): pass</code>.",
        key_points: ["<code>SyntaxError</code> is raised at parse time; most exceptions are raised at runtime.", "Always catch specific exceptions, not bare <code>except:</code> which catches even <code>KeyboardInterrupt</code>.", "Custom exceptions should inherit from <code>Exception</code>, not <code>BaseException</code>.", "<code>except (TypeError, ValueError) as e</code> catches multiple types in one clause.", "Exception objects carry a traceback (<code>.__traceback__</code>) and can be chained using <code>raise NewExc from original_exc</code>."]
      },
      "Try vs Finally": {
        section: "Error Handling & Debugging",
        definition: "The <code>try</code> block contains code that might raise an exception. The <code>finally</code> block contains cleanup code that is <strong>always executed</strong> regardless of whether an exception occurred, was caught, or the function returned early.",
        internal_working: "When a <code>try</code> block exits (normally, via exception, via <code>return</code>, or via <code>break</code>/<code>continue</code>), Python's exception handling machinery always executes the <code>finally</code> block before propagating the exit. If both the <code>try</code> and <code>finally</code> blocks raise exceptions, the <code>finally</code> exception replaces the original. Context managers (<code>with</code>) implement this pattern internally using <code>__exit__</code>.",
        use_case: "<code>finally</code> for resource cleanup: closing files, database connections, releasing locks — even if the code fails. However, prefer <code>with</code> statements (context managers) over manual try/finally for resource management.",
        key_points: ["<code>finally</code> always runs — even if there's a <code>return</code>, <code>break</code>, or uncaught exception in the <code>try</code> block.", "A <code>return</code> in <code>finally</code> overrides any <code>return</code> in the <code>try</code> or <code>except</code> block — a subtle bug source.", "Prefer <code>with open(...) as f</code> over try/finally for file handling — context managers are cleaner.", "<code>try/except/else/finally</code>: <code>else</code> runs if no exception was raised; <code>finally</code> always runs.", "Use <code>finally</code> for cleanup that must happen: closing sockets, releasing locks, removing temp files."]
      },
      "Raise vs Assert": {
        section: "Error Handling & Debugging",
        definition: "<code>raise</code> explicitly raises an exception at any point in code — used for intentional error signalling in production code. <code>assert</code> raises <code>AssertionError</code> if a condition is False — intended for debugging and internal invariant checking, and can be disabled with <code>python -O</code>.",
        internal_working: "<code>raise ExceptionType(msg)</code> compiles to the <code>RAISE_VARARGS</code> bytecode. <code>assert condition, msg</code> compiles to a conditional <code>RAISE_VARARGS</code> with <code>AssertionError</code>, but this is omitted entirely when Python runs with the <code>-O</code> (optimise) flag — assertions do not exist in optimised bytecode.",
        use_case: "<code>raise ValueError('age must be positive')</code> — production validation that should always run. <code>assert len(data) == expected, 'size mismatch'</code> — sanity check during development/testing that may be stripped in production.",
        key_points: ["Never use <code>assert</code> for input validation in production code — it can be silently disabled with <code>-O</code> flag.", "<code>raise</code> with no argument inside an <code>except</code> block re-raises the current exception, preserving the original traceback.", "Use <code>raise NewException from original</code> to chain exceptions and preserve context.", "<code>assert</code> is for invariants that should never fail in correct code; <code>raise</code> is for expected error conditions.", "<code>assert False, 'msg'</code> in tests is fine; use <code>pytest.raises()</code> or <code>unittest.assertRaises()</code> for testing exceptions."]
      },
      "Compile-time vs Runtime Error": {
        section: "Error Handling & Debugging",
        definition: "A <strong>compile-time error</strong> (syntax error) is detected by the Python parser/compiler before the code runs — the program fails to execute at all. A <strong>runtime error</strong> (exception) occurs during execution when an operation fails on actual data.",
        internal_working: "Python's compilation phase (parsing + bytecode generation) catches <code>SyntaxError</code> and <code>IndentationError</code>. The bytecode is then executed by the interpreter where runtime errors like <code>NameError</code>, <code>TypeError</code>, <code>ZeroDivisionError</code> can occur. Python doesn't have a separate compilation step in the traditional sense but does compile to <code>.pyc</code> bytecode.",
        use_case: "Compile-time: <code>if x =</code> (missing right side) — caught before running. Runtime: <code>int('abc')</code> — only fails when that line executes with that data. Static analysis tools (mypy, pylint) can catch some runtime errors (type mismatches) before execution.",
        key_points: ["<code>SyntaxError</code> and <code>IndentationError</code> are compile-time — the entire script fails to load.", "<code>NameError</code> (<code>undefined variable</code>) is a runtime error — occurs only when that line is reached.", "Python's dynamic typing means many type errors only surface at runtime, unlike statically typed languages.", "Use mypy for static type checking to catch type errors before runtime.", "<code>compile(source, '', 'exec')</code> can be used to detect syntax errors without running code."]
      },
      "Logging vs Print": {
        section: "Error Handling & Debugging",
        definition: "<code>print()</code> writes to stdout and is intended for simple script output or debugging. The <code>logging</code> module provides a structured, configurable system for recording messages with levels (DEBUG, INFO, WARNING, ERROR, CRITICAL), timestamps, source location, and output routing to files/streams.",
        internal_working: "<code>print()</code> calls <code>sys.stdout.write()</code> — simple, immediate, no metadata. Python's <code>logging</code> module uses a hierarchy of Logger objects, Handlers (console, file, network), Formatters, and Filters. Log records include timestamp, logger name, level, module, line number, and message. All configuration can be done without code changes via config files.",
        use_case: "Use <code>logging</code> for any production code, libraries, or applications. Use <code>print</code> for quick one-off debugging or simple scripts. Library authors should always use <code>logging</code> (never <code>print</code>) so users can configure output.",
        key_points: ["Never use <code>print()</code> in production code or libraries — use <code>logging.debug/info/warning/error()</code>.", "Logging supports levels: DEBUG < INFO < WARNING < ERROR < CRITICAL — you can filter by level at runtime without code changes.", "<code>logging.basicConfig(level=logging.DEBUG)</code> sets up a simple configuration.", "Use <code>%s</code>-style formatting in logging: <code>logging.debug('Value: %s', val)</code> — message not formatted until needed.", "Structured logging (JSON output) is better for log aggregation systems like ELK, Datadog."]
      },
      "Debugging vs Testing": {
        section: "Error Handling & Debugging",
        definition: "<strong>Debugging</strong> is the process of finding and fixing defects in existing code — it's reactive, done after a problem is observed. <strong>Testing</strong> is the process of proactively verifying code behaves correctly for defined inputs and conditions — it's preventive, done to catch bugs before or catch regressions.",
        internal_working: "Python's debugger is <code>pdb</code> (or <code>breakpoint()</code> in Python 3.7+) — it pauses execution and provides an interactive REPL to inspect state, step through code, and evaluate expressions. Testing is done with <code>unittest</code> or <code>pytest</code> — test runner discovers and executes test functions, asserting expected outcomes.",
        use_case: "Debugging: <code>breakpoint()</code> in code, then use <code>n</code> (next), <code>s</code> (step), <code>p var</code> (print) in pdb. Testing: <code>def test_add(): assert add(2, 3) == 5</code> in a pytest file.",
        key_points: ["Use <code>breakpoint()</code> (Python 3.7+) instead of <code>import pdb; pdb.set_trace()</code> — it respects the PYTHONBREAKPOINT env var.", "TDD (Test-Driven Development): write tests before code — tests define expected behaviour.", "pytest autodiscovers tests in files named <code>test_*.py</code> and functions named <code>test_*</code>.", "Debugging is not a substitute for tests — bugs found manually are often not caught by automated tests later.", "Use <code>-v</code> flag in pytest for verbose output; <code>--pdb</code> drops into debugger on failure."]
      },
      "Unit Test vs Integration Test": {
        section: "Error Handling & Debugging",
        definition: "A <strong>unit test</strong> tests a single, isolated unit of code (a function or class) with all dependencies mocked/stubbed. An <strong>integration test</strong> tests how multiple components work together — including real dependencies like databases, APIs, or file systems.",
        internal_working: "Unit tests run in complete isolation using mocking (<code>unittest.mock</code>) to replace external dependencies with controlled fakes. Integration tests set up real (or test) infrastructure, run the components in combination, and verify end-to-end behaviour. Unit tests run in milliseconds; integration tests may take seconds or minutes.",
        use_case: "Unit test: <code>def test_calculate_tax(): assert calculate_tax(100, 0.2) == 20</code> — no DB, no network. Integration test: <code>def test_user_registration(db): user = register_user(db, 'alice'); assert db.find_user('alice')</code>.",
        key_points: ["Unit tests should be fast (<1ms each), deterministic, and isolated — no file I/O, network, or DB.", "Integration tests catch interface mismatches between components that unit tests miss.", "Test pyramid: many unit tests, fewer integration tests, even fewer end-to-end tests.", "Mocking too much in unit tests can lead to tests that pass but the integrated system fails.", "Use <code>pytest</code> fixtures for setup/teardown and dependency injection in integration tests."]
      },
      "Mock vs Stub": {
        section: "Error Handling & Debugging",
        definition: "A <strong>stub</strong> is a test double that returns hardcoded/predefined responses to calls — it replaces a dependency with minimal behaviour to control test inputs. A <strong>mock</strong> is a test double that also records how it was called, allowing verification of interactions (which methods were called, with what arguments, how many times).",
        internal_working: "Python's <code>unittest.mock.MagicMock</code> is both a stub and a mock — it auto-creates attributes and methods, records all calls, and allows assertion of interactions via <code>mock.assert_called_once_with()</code>. <code>Mock(return_value=42)</code> stubs the return. <code>mock.assert_called_with('arg')</code> verifies interaction.",
        use_case: "Stub: <code>mock_db.get_user.return_value = User('alice')</code> — controls what the function returns. Mock verification: <code>mock_email.send.assert_called_once_with(to='alice@example.com')</code> — verifies the email was sent.",
        key_points: ["Use <code>@patch('module.ClassName')</code> decorator to automatically replace a dependency with a Mock for the duration of a test.", "<code>MagicMock</code> supports magic methods (<code>__len__</code>, <code>__iter__</code>); use it by default.", "Mocks verify behaviour (interactions); stubs provide state — both are needed in different scenarios.", "<code>side_effect</code>: <code>mock.fn.side_effect = [val1, val2, Exception()]</code> returns different values on each call.", "Over-mocking creates brittle tests — mock only what you own or what crosses architectural boundaries."]
      },
      "Assertion vs Exception Handling": {
        section: "Error Handling & Debugging",
        definition: "<strong>Assertions</strong> (<code>assert</code>) are for verifying internal programmer assumptions and invariants during development — they signal a bug in the code itself. <strong>Exception handling</strong> (<code>try/except</code>) is for managing expected, recoverable error conditions that can occur in production due to external inputs or environment.",
        internal_working: "Assertions compile to conditional <code>AssertionError</code> raises and are stripped by <code>python -O</code>. Exception handling is always active and uses the exception machinery — unwinding the stack to find a matching handler. The runtime overhead of a <code>try</code> block that doesn't raise is minimal in CPython.",
        use_case: "Assert: <code>assert result is not None, 'BUG: process() should never return None'</code>. Exception: <code>try: user = db.get(id) except DatabaseError: return 404</code>.",
        key_points: ["Assert = 'this should never happen'; except = 'this might happen and we can handle it'.", "Assertions can be disabled — never use them for input validation or security checks.", "<code>try/except</code> is the right mechanism for all expected error conditions in production code.", "EAFP (Easier to Ask Forgiveness than Permission): Python style favours try/except over pre-checks (<code>if key in dict</code> vs <code>try: d[key] except KeyError</code>).", "Catching and silently swallowing exceptions (<code>except: pass</code>) is an anti-pattern — always log or handle meaningfully."]
      },
      "Stack Trace vs Error Message": {
        section: "Error Handling & Debugging",
        definition: "A <strong>stack trace</strong> (traceback) is the sequence of function calls active at the time an exception was raised — it shows the path through the code that led to the error. An <strong>error message</strong> is the human-readable string describing what went wrong, typically attached to the exception.",
        internal_working: "When an exception propagates uncaught, CPython's <code>traceback</code> module formats the exception's <code>__traceback__</code> attribute — a chain of frame objects. Each frame records the filename, line number, and function name. The traceback is printed innermost call last by default. Error messages are the string argument to the exception constructor: <code>ValueError('age must be > 0')</code>.",
        use_case: "Debugging: read the stack trace from the bottom up — the last frame is the actual error location. Logging: <code>logging.exception('Failed')</code> logs both message and full traceback. Use <code>traceback.format_exc()</code> to capture the traceback as a string.",
        key_points: ["Read tracebacks bottom-up — the last line is the actual error; lines above show how you got there.", "<code>logging.exception('msg')</code> automatically includes the full traceback in the log entry.", "Exception chaining (<code>raise B from A</code>) shows both the original and the new exception in the traceback.", "<code>traceback.print_exc()</code> and <code>traceback.format_exc()</code> programmatically access traceback info.", "In production, capture tracebacks in error monitoring tools (Sentry, Rollbar) rather than printing to stdout."]
      },
      "Stack vs Heap Memory": {
        section: "Memory Management & Performance",
        definition: "<strong>Stack memory</strong> is the region used for function call frames — fast, automatically managed, LIFO, limited size. <strong>Heap memory</strong> is the region for dynamic object allocation — larger, managed by the garbage collector, persists as long as there are references.",
        internal_working: "In CPython, all Python objects are heap-allocated via <code>pymalloc</code> (a custom allocator for small objects ≤512 bytes, built on <code>malloc</code>). The C-level call stack holds CPython's interpreter frames (frame pointers, return addresses) — not Python objects themselves. Python frame objects (<code>PyFrameObject</code>) are themselves heap-allocated.",
        use_case: "Understanding stack vs heap helps explain: why deep recursion causes stack overflow (C stack exhaustion), why large data structures work (heap), why <code>del large_obj</code> may reclaim memory (heap deallocation via reference counting).",
        key_points: ["In CPython, Python objects always live on the heap — there's no stack allocation of Python objects.", "Stack overflow in Python = <code>RecursionError</code> — it's the C interpreter stack that overflows.", "Python's memory manager has a free-list for small objects to reduce <code>malloc</code> overhead.", "<code>sys.getsizeof(obj)</code> reports heap size of an object; actual memory may be higher due to referenced objects.", "Memory fragmentation is managed by Python's allocator — long-running processes may hold fragmented memory pools."]
      },
      "Reference vs Value": {
        section: "Memory Management & Performance",
        definition: "Python uses <strong>pass-by-object-reference</strong> (sometimes called 'pass-by-assignment'). Variables hold references to objects, not the objects themselves. When a variable is assigned, the reference is copied — not the object. Whether mutation is visible depends on whether the object is mutable.",
        internal_working: "Every Python variable is a name in a namespace dict pointing to a <code>PyObject</code>. Assignment (<code>a = b</code>) copies the pointer, not the data. Passing an object to a function copies the pointer — the function receives a reference to the same object. For mutable objects, in-place mutations via this reference are visible to the caller. For immutable objects, any 'modification' creates a new object.",
        use_case: "<code>def append_one(lst): lst.append(1)</code> — caller sees the change (mutable, same reference). <code>def increment(n): n += 1</code> — caller's integer is unchanged (immutable, rebinding creates new int).",
        key_points: ["Python is neither purely 'pass by value' nor 'pass by reference' — it's 'pass by assignment' (reference to the object).", "Mutable argument mutations are visible to the caller; rebinding a parameter (<code>x = new_val</code>) is not.", "<code>id(obj)</code> returns the memory address — compare before/after assignment to understand reference semantics.", "To avoid mutating the caller's list, pass a copy: <code>fn(lst[:])</code> or <code>fn(list(lst))</code>.", "Augmented assignment on immutables (<code>x += 1</code>) creates a new object and rebinds <code>x</code>; on mutables like lists, <code>lst += [1]</code> modifies in place via <code>__iadd__</code>."]
      },
      "Garbage Collection vs Manual Memory": {
        section: "Memory Management & Performance",
        definition: "<strong>Garbage collection</strong> automatically reclaims memory occupied by objects no longer reachable, without programmer intervention. <strong>Manual memory management</strong> (as in C/C++) requires the programmer to explicitly allocate and free memory.",
        internal_working: "CPython uses two mechanisms: <strong>reference counting</strong> (primary) — every object has a <code>ob_refcnt</code> field; when it reaches 0, the object is immediately deallocated. The <strong>cyclic garbage collector</strong> (<code>gc</code> module) supplements this to break reference cycles that reference counting alone cannot resolve. It runs periodically (or on demand via <code>gc.collect()</code>) using a generational algorithm.",
        use_case: "Python developers rarely worry about memory manually. Key scenarios: <code>del obj</code> to hint GC, <code>gc.disable()</code> for performance-critical sections, <code>weakref</code> to avoid cycles, and <code>__del__</code> for cleanup (use context managers instead).",
        key_points: ["Reference counting ensures most objects are freed immediately when their last reference is dropped — no GC pause.", "The cyclic GC handles cycles: <code>a.ref = b; b.ref = a</code> — these are collected in generations.", "Use <code>weakref.ref(obj)</code> to reference an object without incrementing its reference count — prevents cycles.", "<code>gc.collect()</code> forces a garbage collection cycle — useful in tests or before memory-intensive operations.", "CPython does not compact memory — deleted objects leave holes; this can cause fragmentation in long-running processes."]
      },
      "Shallow vs Deep Comparison": {
        section: "Memory Management & Performance",
        definition: "<strong>Shallow comparison</strong> compares only the top-level identity or values of objects, without recursively comparing nested contents. <strong>Deep comparison</strong> recursively compares all nested structures to determine equality.",
        internal_working: "Python's <code>==</code> operator triggers <code>__eq__</code> — for built-in containers (list, dict), this performs a deep recursive element-by-element comparison. The <code>is</code> operator performs a pointer comparison (shallowest possible check). <code>copy.deepcopy</code> vs <code>copy.copy</code> mirrors this for copying. For custom objects, <code>__eq__</code> is shallow by default (identity) unless overridden.",
        use_case: "<code>list1 == list2</code> — deep value comparison of all elements. <code>list1 is list2</code> — identity check (same object). For performance in caches: compare hashes (shallow) before falling back to deep equality.",
        key_points: ["Python's <code>==</code> on lists/dicts/tuples is deep — it recursively compares nested elements.", "Custom classes default to identity comparison (<code>is</code>) for <code>==</code> unless <code>__eq__</code> is overridden.", "Deep comparison is O(n) where n is the total number of nested elements — can be slow for large structures.", "For testing, <code>assert result == expected</code> does deep comparison; for object identity, use <code>assert result is expected</code>.", "<code>dataclasses(eq=True)</code> auto-generates <code>__eq__</code> based on all fields."]
      },
      "Copy vs Assignment": {
        section: "Memory Management & Performance",
        definition: "<strong>Assignment</strong> (<code>b = a</code>) creates a new reference pointing to the same object — both variables refer to the same data. <strong>Copy</strong> creates a new object with the same contents — changes to the copy do not affect the original (depending on shallow vs deep).",
        internal_working: "Assignment: increments reference count of the object, creates a new binding in the namespace — O(1), no data copied. Shallow copy: creates a new container but shares inner object references — O(n) for n top-level elements. Deep copy: recursively creates new objects for all levels — O(n) total objects copied.",
        use_case: "Assignment: <code>b = a</code> — both point to same list; modifying <code>b</code> changes <code>a</code>. Shallow copy: <code>b = a.copy()</code> — safe for flat lists. Deep copy: <code>b = copy.deepcopy(a)</code> — safe for nested mutable structures.",
        key_points: ["<code>b = a</code> does not copy data — both names point to the same object.", "<code>a = [1,2,3]; b = a; b.append(4)</code> — <code>a</code> is now <code>[1,2,3,4]</code>. This surprises many beginners.", "Shallow copy methods: <code>list.copy()</code>, <code>dict.copy()</code>, <code>list[:]</code>, <code>list()</code>, <code>copy.copy()</code>.", "For immutables (int, str, tuple), assignment and copy behave the same — no mutation possible.", "Function arguments are passed by assignment — mutable default args persist across calls (the classic Python gotcha)."]
      },
      "Interning vs Normal Objects": {
        section: "Memory Management & Performance",
        definition: "<strong>Interning</strong> is an optimisation where Python reuses existing objects for certain values rather than creating new ones — multiple variables pointing to the same object for common values. This saves memory and makes identity comparison O(1).",
        internal_working: "CPython interns: small integers (-5 to 256), string literals that look like identifiers (ASCII letters/digits/underscores), and some short strings at compile time. The intern table is a dict mapping value to the canonical object. <code>sys.intern(s)</code> forces string interning. Interned objects' <code>is</code> comparison is True even for separately created instances.",
        use_case: "Interning is mostly an implementation detail. Relevant for: understanding why <code>a = 256; b = 256; a is b</code> is <code>True</code> but <code>a = 257; b = 257; a is b</code> may be <code>False</code>. Use <code>sys.intern()</code> for dictionaries with many repeated string keys to save memory.",
        key_points: ["Small integers (-5 to 256) are singletons — <code>a = 100; b = 100; a is b</code> is always <code>True</code>.", "String interning applies to compile-time string literals that look like identifiers; dynamically created strings are not interned by default.", "Never rely on <code>is</code> for string/integer equality — use <code>==</code> instead; interning is an implementation detail.", "<code>sys.intern('string')</code> forces a string into the intern table — useful for high-frequency dict keys.", "Interning saves memory in applications with many repeated string values (e.g., HTTP headers, JSON keys)."]
      },
      "Pass by Value vs Pass by Reference": {
        section: "Memory Management & Performance",
        definition: "Python is neither pass-by-value nor pass-by-reference in the traditional sense — it uses <strong>pass-by-object-reference</strong>. The reference (pointer) to the object is passed by value. Mutable objects can be modified through this reference; rebinding the parameter has no effect on the caller.",
        internal_working: "Each function call creates a new local namespace where parameter names are bound to the passed objects. The binding itself (reference) is passed by value — a copy of the pointer. For mutable objects, calling methods that modify in-place (<code>list.append</code>) affects the original. For immutable objects (<code>int</code>, <code>str</code>), any modification creates a new object.",
        use_case: "<code>def double(lst): lst *= 2</code> — modifies caller's list (mutable, in-place). <code>def double(n): n *= 2</code> — does NOT affect caller's integer (immutable, creates new object and rebinds <code>n</code>).",
        key_points: ["Python's model: the reference is passed by value — neither purely pass-by-value nor pass-by-reference.", "Mutable objects (list, dict, set) can be modified in-place through the received reference — visible to caller.", "Rebinding a parameter (<code>param = new_value</code>) never affects the caller — it just rebinds the local name.", "To truly prevent mutation, pass immutable types or explicit copies: <code>fn(list(original))</code>.", "This is sometimes called 'call by sharing' or 'call by object reference' in the literature."]
      },
      "CPU-bound vs IO-bound": {
        section: "Memory Management & Performance",
        definition: "A <strong>CPU-bound</strong> task is limited by processor speed — it spends most of its time performing computations. An <strong>IO-bound</strong> task is limited by input/output operations — it spends most of its time waiting for disk, network, or database operations.",
        internal_working: "CPython's GIL (Global Interpreter Lock) prevents true parallel execution of Python threads. For IO-bound tasks, threads release the GIL during IO waits — so threading and asyncio provide real concurrency. For CPU-bound tasks, the GIL is held during computation — only multiprocessing achieves true parallelism by using separate processes (each with its own GIL).",
        use_case: "CPU-bound: data crunching, encryption, image processing — use <code>multiprocessing</code> or NumPy/C extensions. IO-bound: web requests, database queries, file reads — use <code>threading</code>, <code>asyncio</code>, or <code>concurrent.futures.ThreadPoolExecutor</code>.",
        key_points: ["GIL means Python threads don't parallelize CPU-bound work — use <code>multiprocessing</code> for CPU-bound tasks.", "For IO-bound work, <code>asyncio</code> (single thread, event loop) is the most efficient; threading is also fine.", "Profile first with <code>cProfile</code> to determine if a bottleneck is CPU-bound or IO-bound before choosing concurrency model.", "NumPy/SciPy release the GIL for numerical operations — making threading viable for some CPU tasks.", "<code>concurrent.futures</code> provides a unified API: <code>ThreadPoolExecutor</code> (IO) and <code>ProcessPoolExecutor</code> (CPU)."]
      },
      "Time Complexity vs Space Complexity": {
        section: "Memory Management & Performance",
        definition: "<strong>Time complexity</strong> measures how execution time grows as input size increases — expressed in Big O notation (e.g., O(n), O(log n)). <strong>Space complexity</strong> measures how memory usage grows with input size.",
        internal_working: "Time complexity is analysed by counting the dominant operations as input grows. Space complexity counts auxiliary memory allocations. Common Python operations: list indexing O(1), list append O(1) amortized, list search O(n), dict/set lookup O(1) average, sort O(n log n). Space: recursion depth O(n) stack frames, generator O(1) vs list comprehension O(n).",
        use_case: "Choosing between a list and a set for membership testing: O(n) vs O(1) — when checking a million lookups, O(1) wins decisively. Choosing between recursion (O(n) space) and iteration (O(1) space) for deep structures.",
        key_points: ["O(1) < O(log n) < O(n) < O(n log n) < O(n²) < O(2^n) — know this order for interviews.", "Amortized O(1): <code>list.append()</code> is occasionally O(n) (reallocation) but O(1) on average.", "Space-time tradeoffs: memoisation uses O(n) space to reduce time from O(2^n) to O(n) for Fibonacci.", "Python dict/set lookup is O(1) average but O(n) worst-case with many hash collisions.", "Generator expressions use O(1) space; list comprehensions O(n) — critical for large datasets."]
      },
      "Caching vs Memoization": {
        section: "Memory Management & Performance",
        definition: "<strong>Memoization</strong> is a specific caching technique where the results of a function call are cached keyed by the function's arguments — so repeated calls with the same inputs return the cached result without recomputing. <strong>Caching</strong> is the broader concept of storing computed/fetched results to avoid redundant work.",
        internal_working: "Python's <code>functools.lru_cache(maxsize=n)</code> implements memoization using an <code>OrderedDict</code>-like structure with LRU eviction. The cache key is a tuple of arguments (must be hashable). <code>functools.cache</code> (Python 3.9+) is an unbounded cache. Caching in general can use <code>functools.cached_property</code>, Redis, Memcached, or application-level dicts.",
        use_case: "Memoize recursive Fibonacci: <code>@lru_cache(maxsize=None)</code> transforms O(2^n) into O(n). Cache expensive DB queries: store results in a dict/Redis keyed by query parameters. Cache property values: <code>@cached_property</code> computes once per instance.",
        key_points: ["<code>@lru_cache</code> requires all arguments to be hashable — cannot cache calls with list/dict args.", "<code>@lru_cache(maxsize=None)</code> (or <code>@cache</code>) is an unbounded cache — can cause memory leaks if used on functions with many unique inputs.", "<code>lru_cache</code> provides <code>.cache_info()</code> to inspect hits/misses and <code>.cache_clear()</code> to reset.", "Memoization is only safe for pure functions — side-effectful functions should not be memoized.", "<code>@functools.cached_property</code> computes a property value once per instance and stores it in the instance's <code>__dict__</code>."]
      },
      "Multithreading vs Multiprocessing": {
        section: "Concurrency & Parallelism",
        definition: "<strong>Multithreading</strong> runs multiple threads within a single process, sharing the same memory space. <strong>Multiprocessing</strong> spawns separate processes, each with its own memory space and Python interpreter. In CPython, only multiprocessing achieves true parallel execution for CPU-bound tasks due to the GIL.",
        internal_working: "CPython's GIL (Global Interpreter Lock) is a mutex that only allows one thread to execute Python bytecode at a time. IO-bound threads release the GIL during IO waits, enabling concurrent progress. Multiprocessing uses <code>fork()</code>/<code>spawn()</code> system calls to create independent processes — no GIL contention. Inter-process communication via <code>Queue</code>, <code>Pipe</code>, or shared memory.",
        use_case: "Multithreading: concurrent web requests (<code>ThreadPoolExecutor</code>), GUI responsiveness. Multiprocessing: CPU-intensive tasks — data processing, ML training, image rendering (<code>ProcessPoolExecutor</code>).",
        key_points: ["GIL prevents threads from running Python bytecode in parallel — multithreading in CPython is for concurrency (IO-bound), not parallelism.", "Multiprocessing bypasses the GIL by using separate processes — each has its own GIL and memory.", "Data sharing: threads share memory (use locks); processes need IPC (Queue, Pipe, shared memory).", "Multiprocessing has higher startup cost (process creation) and serialisation overhead for inter-process data.", "<code>concurrent.futures</code> provides <code>ThreadPoolExecutor</code> and <code>ProcessPoolExecutor</code> with the same API."]
      },
      "Concurrency vs Parallelism": {
        section: "Concurrency & Parallelism",
        definition: "<strong>Concurrency</strong> is the ability to deal with multiple tasks at once by interleaving their execution — tasks make progress by switching context (not necessarily simultaneously). <strong>Parallelism</strong> is doing multiple tasks at literally the same time on multiple CPU cores.",
        internal_working: "Concurrency in Python: achieved via threads (OS scheduler switches between them) or asyncio (cooperative switching at <code>await</code> points) — one core can handle many tasks concurrently. Parallelism: multiprocessing runs tasks on separate cores simultaneously. Python's GIL limits thread-based parallelism for Python code.",
        use_case: "Concurrency: handling 1000 simultaneous HTTP connections with asyncio — one thread, many tasks interleaved. Parallelism: processing a 1GB CSV by splitting it across 8 CPU cores with multiprocessing.",
        key_points: ["Concurrency is about structure (dealing with many things at once); parallelism is about execution (doing many things simultaneously).", "You can have concurrency without parallelism (single-core threading) and parallelism without concurrency (MapReduce batch jobs).", "Asyncio provides concurrency via cooperative multitasking — functions yield control at <code>await</code> points.", "Python's GIL allows IO-bound concurrent threading but blocks CPU-bound parallel threading.", "Quote (Rob Pike): 'Concurrency is about dealing with lots of things at once. Parallelism is about doing lots of things at once.'"]
      },
      "Thread vs Process": {
        section: "Concurrency & Parallelism",
        definition: "A <strong>thread</strong> is a lightweight unit of execution within a process, sharing the process's memory and resources. A <strong>process</strong> is an independent program instance with its own memory space, file handles, and resources.",
        internal_working: "Threads share the same heap, global variables, and file descriptors — communication is via shared memory (use locks for safety). Processes have isolated memory spaces — communication requires IPC (pipes, queues, shared memory). Thread creation is cheap (microseconds); process creation is expensive (milliseconds, involves copying memory tables). Python threads are OS threads mapped 1:1 to kernel threads.",
        use_case: "Thread: background tasks within an app, handling client connections. Process: running computationally intensive jobs that need separate CPU cores, or isolating unstable third-party code.",
        key_points: ["Threads share memory — faster communication, but require synchronisation (locks) to avoid race conditions.", "Processes are isolated — no data races, but IPC overhead and higher memory usage.", "A process crash doesn't affect other processes; a thread crash or corruption can crash the whole process.", "CPython's GIL makes threads unsuitable for CPU-bound parallelism — use processes instead.", "<code>os.fork()</code> creates a copy-on-write child process on Unix; <code>multiprocessing.Process</code> is cross-platform."]
      },
      "GIL vs No-GIL": {
        section: "Concurrency & Parallelism",
        definition: "The <strong>GIL</strong> (Global Interpreter Lock) is a mutex in CPython that ensures only one thread executes Python bytecode at a time, simplifying memory management but limiting CPU-bound parallelism in threads. <strong>No-GIL</strong> refers to Python running without this lock — an experimental feature (PEP 703, Python 3.13 opt-in) allowing true thread-level parallelism.",
        internal_working: "CPython uses reference counting for memory management — this requires atomic operations on <code>ob_refcnt</code>. The GIL serialises all object access, making reference counting thread-safe without per-object locks. Without the GIL (Python 3.13 free-threaded build), each object needs fine-grained locking. The GIL is released during IO operations, C extension calls that declare thread safety, and every 100 bytecode instructions (sys.getswitchinterval).",
        use_case: "GIL impact: <code>threading</code> won't speed up CPU-bound Python code — multiple threads on CPU-heavy work can be slower than single-threaded. No-GIL opens the door to true Python thread parallelism for CPU-bound tasks — still experimental in 3.13.",
        key_points: ["The GIL only affects CPython — Jython and IronPython have no GIL.", "IO-bound threads release the GIL during waits — threading is still useful for IO-bound concurrency.", "Python 3.2 improved the GIL with a new implementation that's fairer to IO-bound threads.", "Python 3.13 (2024) introduced an experimental free-threaded mode (<code>--disable-gil</code>) — a major milestone.", "Extensions built for GIL-enabled Python may not be thread-safe in a GIL-free world."]
      },
      "Sync vs Async": {
        section: "Concurrency & Parallelism",
        definition: "<strong>Synchronous</strong> code executes sequentially — each operation must complete before the next one begins, blocking the caller. <strong>Asynchronous</strong> code allows a task to initiate an operation and yield control while waiting, enabling other tasks to run — non-blocking.",
        internal_working: "Sync code runs in the normal call stack. Async in Python uses <code>asyncio</code>'s event loop — coroutines are defined with <code>async def</code> and use <code>await</code> to suspend at IO points. When a coroutine awaits, the event loop schedules another ready coroutine. The event loop runs in a single thread using <code>select()/epoll()/kqueue()</code> for IO multiplexing.",
        use_case: "Sync: sequential scripts, CPU work. Async: high-concurrency web servers (FastAPI, aiohttp), async DB queries, concurrent API calls: <code>results = await asyncio.gather(fetch(url1), fetch(url2))</code>.",
        key_points: ["Async doesn't make code faster — it makes better use of wait time by running other tasks during IO.", "Use <code>async def</code> and <code>await</code>; running sync blocking code in async context blocks the event loop.", "<code>asyncio.gather(*coros)</code> runs multiple coroutines concurrently on the same event loop.", "Mixing sync and async code: use <code>asyncio.run_in_executor()</code> to offload blocking calls to a thread pool.", "FastAPI, HTTPX, aiohttp, asyncpg are async-first libraries — much higher throughput than sync equivalents."]
      },
      "Blocking vs Non-blocking": {
        section: "Concurrency & Parallelism",
        definition: "A <strong>blocking</strong> call suspends the calling thread/coroutine until the operation completes — the thread cannot do other work during the wait. A <strong>non-blocking</strong> call returns immediately (with partial data or a status indicator) allowing the caller to do other work and check back later.",
        internal_working: "Blocking IO: <code>socket.recv(1024)</code> halts the thread until data arrives. Non-blocking IO: <code>socket.setblocking(False)</code> returns immediately with <code>BlockingIOError</code> if no data — requires polling or an event loop. <code>asyncio</code> wraps non-blocking syscalls with coroutines: <code>await reader.read(1024)</code> suspends the coroutine (not the thread) until data is available.",
        use_case: "Blocking: simple scripts where sequential execution is fine. Non-blocking: high-performance servers handling thousands of connections — use asyncio or select/epoll to multiplex IO on a single thread.",
        key_points: ["Blocking calls hold the thread; in asyncio, always use <code>await</code> with async IO to avoid blocking the event loop.", "Calling a blocking function inside <code>async def</code> blocks the entire event loop — wrap with <code>run_in_executor</code>.", "<code>socket.settimeout(n)</code> makes blocking calls time out after n seconds.", "Most Python standard library IO is blocking by default — async libraries (aiohttp, asyncpg) provide non-blocking alternatives.", "Event-driven servers (nginx, Node.js) are built on non-blocking IO — Python's asyncio enables the same pattern."]
      },
      "Thread Pool vs Process Pool": {
        section: "Concurrency & Parallelism",
        definition: "A <strong>thread pool</strong> maintains a fixed set of reusable threads to execute submitted tasks — avoids thread creation overhead per task, good for IO-bound work. A <strong>process pool</strong> maintains a fixed set of worker processes — good for CPU-bound work that needs to bypass the GIL.",
        internal_working: "<code>concurrent.futures.ThreadPoolExecutor(max_workers=n)</code> maintains a pool of n threads; submitted tasks are placed in a queue and picked up by idle threads. <code>ProcessPoolExecutor(max_workers=n)</code> spawns n worker processes; tasks and results are serialised with pickle for inter-process transfer. Both return <code>Future</code> objects.",
        use_case: "Thread pool: <code>with ThreadPoolExecutor(10) as ex: futures = [ex.submit(fetch_url, u) for u in urls]</code>. Process pool: <code>with ProcessPoolExecutor(8) as ex: results = list(ex.map(process_chunk, data_chunks))</code>.",
        key_points: ["<code>concurrent.futures</code> provides a unified API for both — easy to switch between thread and process pool.", "Thread pool is lighter (threads share memory); process pool handles CPU-bound work truly in parallel.", "Tasks submitted to ProcessPoolExecutor must be picklable — lambdas and closures may not be.", "Pool size: IO-bound thread pools can have many threads (10–100+); CPU-bound process pools should match CPU count.", "<code>executor.map(fn, iterable)</code> is a convenient parallel map; <code>executor.submit(fn, arg)</code> for individual tasks."]
      },
      "Asyncio vs Threading": {
        section: "Concurrency & Parallelism",
        definition: "<code>asyncio</code> provides cooperative, single-threaded concurrency using an event loop — coroutines explicitly yield control at <code>await</code> points. <code>threading</code> provides preemptive concurrency — the OS scheduler switches threads at any point. Both handle IO-bound concurrency; asyncio scales better; threading is simpler to integrate with existing code.",
        internal_working: "asyncio's event loop uses non-blocking IO multiplexing (epoll/kqueue) to monitor file descriptors and run coroutines when their IO is ready — all in one thread. Threading uses OS threads which the kernel schedules preemptively — context switches happen at OS-level. asyncio coroutines can run 10,000+ concurrently; threading typically maxes at 100–500 threads due to memory overhead.",
        use_case: "asyncio: high-concurrency web servers, async API clients, real-time data pipelines. threading: legacy codebases, integrating blocking libraries, simple background tasks.",
        key_points: ["asyncio scales better — thousands of coroutines vs hundreds of threads.", "Threading works with existing blocking code; asyncio requires the entire call stack to be async-aware.", "asyncio has no GIL issues (single thread); threading is still limited by the GIL for CPU work.", "asyncio bugs are harder to debug — missing <code>await</code> causes subtle non-execution bugs.", "<code>asyncio.run_in_executor()</code> bridges sync and async worlds by running blocking code in a thread pool."]
      },
      "Future vs Promise": {
        section: "Concurrency & Parallelism",
        definition: "A <strong>Future</strong> (in Python's <code>concurrent.futures</code> and <code>asyncio</code>) is an object representing the eventual result of an asynchronous operation — a placeholder for a value not yet computed. A <strong>Promise</strong> is the same concept from JavaScript — Python adopted the term 'Future' instead.",
        internal_working: "<code>concurrent.futures.Future</code> is thread-safe and set by the executor when the task completes. <code>asyncio.Future</code> is an awaitable object; its result is set by async infrastructure. Both have <code>.result()</code> (blocking/awaiting), <code>.done()</code>, <code>.add_done_callback(fn)</code>, and <code>.cancel()</code>. <code>asyncio.Task</code> is a <code>Future</code> subclass that wraps a coroutine.",
        use_case: "<code>future = executor.submit(fn, arg)</code> — submit task, later call <code>future.result()</code>. In asyncio: <code>task = asyncio.create_task(coro())</code> — runs concurrently, await later.",
        key_points: ["<code>concurrent.futures.Future</code> is for thread/process pools; <code>asyncio.Future</code> is for the event loop — don't mix them.", "<code>asyncio.ensure_future(coro)</code> or <code>asyncio.create_task(coro)</code> schedules a coroutine as a background task.", "<code>future.result()</code> blocks until the result is available (in concurrent.futures); in asyncio, use <code>await future</code>.", "<code>asyncio.gather(*coroutines)</code> returns a future that completes when all given coroutines complete.", "Cancelled futures raise <code>CancelledError</code>; failed futures store the exception, raised on <code>.result()</code>."]
      },
      "Event Loop vs Thread Loop": {
        section: "Concurrency & Parallelism",
        definition: "An <strong>event loop</strong> is a single-threaded loop that monitors IO events and dispatches callbacks/coroutines when IO is ready — the heart of async programming in Python (<code>asyncio</code>). A <strong>thread loop</strong> (like a <code>while True</code> in a thread) runs work continuously in a dedicated thread, blocking on tasks.",
        internal_working: "asyncio's event loop wraps OS IO multiplexing (<code>select</code>/<code>epoll</code>/<code>kqueue</code>): it registers file descriptors, sleeps until one is ready, then runs the associated coroutine until the next <code>await</code>. A thread loop blocks on a queue (<code>queue.Queue.get()</code>) or sleep. Event loops handle thousands of coroutines in one thread; thread loops need one thread per concurrent task.",
        use_case: "Event loop: <code>asyncio.run(main())</code> for async web servers, client connections, real-time streams. Thread loop: background worker thread consuming from a queue — simpler for legacy/blocking code.",
        key_points: ["Never block the event loop — a blocking call in a coroutine stalls all other coroutines.", "asyncio's event loop is single-threaded — no GIL issues, no synchronisation needed for coroutine-local state.", "<code>loop.run_in_executor(None, blocking_fn)</code> offloads blocking work to the default thread pool.", "GUI frameworks (Tkinter, Qt) have their own event loops — integrating asyncio requires bridging.", "<code>asyncio.get_event_loop()</code> is deprecated in Python 3.10+; use <code>asyncio.run()</code> instead."]
      },
      "Pickle vs JSON": {
        section: "File Handling & Serialization",
        definition: "<strong>Pickle</strong> is a Python-specific binary serialisation format that can serialise nearly any Python object (including custom classes, functions, lambdas). <strong>JSON</strong> (JavaScript Object Notation) is a language-agnostic text format supporting only basic types: strings, numbers, lists, dicts, booleans, null.",
        internal_working: "Pickle serialises Python object graphs by recording the type and state needed to reconstruct them — using <code>__reduce__</code>, <code>__getstate__</code>/<code>__setstate__</code> protocols. JSON serialises to UTF-8 text using a strict grammar. JSON parsing is faster and interoperable; Pickle is faster for complex Python objects and handles more types.",
        use_case: "Use JSON for APIs, configs, data interchange between languages/systems. Use Pickle for Python-to-Python persistence: caching ML models, saving scikit-learn pipelines, persisting complex objects.",
        key_points: ["Never unpickle data from untrusted sources — Pickle can execute arbitrary code during deserialisation.", "JSON is human-readable, language-agnostic, and safe; Pickle is binary, Python-only, and potentially dangerous.", "JSON supports: str, int, float, list, dict, bool, None — that's it. Pickle handles custom classes, datetimes, numpy arrays, etc.", "Use <code>protocol=pickle.HIGHEST_PROTOCOL</code> for the most efficient format.", "For scientific objects, consider <code>joblib</code> (numpy-aware) or <code>cloudpickle</code> (serialises lambdas/closures)."]
      },
      "Read vs Write Mode": {
        section: "File Handling & Serialization",
        definition: "<strong>Read mode</strong> (<code>'r'</code>) opens a file for reading — the file must exist; writing raises an error. <strong>Write mode</strong> (<code>'w'</code>) opens a file for writing, truncating (emptying) it if it exists or creating it if it doesn't. Python also has <code>'a'</code> (append), <code>'r+'</code> (read+write), and <code>'x'</code> (exclusive create).",
        internal_working: "File modes map to OS flags: <code>'r'</code> → <code>O_RDONLY</code>, <code>'w'</code> → <code>O_WRONLY | O_CREAT | O_TRUNC</code>, <code>'a'</code> → <code>O_WRONLY | O_CREAT | O_APPEND</code>. Python's <code>open()</code> wraps these syscalls, adding buffering and encoding handling. The <code>with</code> statement ensures <code>close()</code> is called.",
        use_case: "<code>with open('file.txt', 'r') as f: data = f.read()</code>. <code>with open('output.txt', 'w') as f: f.write(result)</code>. Use <code>'a'</code> to append to logs without overwriting.",
        key_points: ["<code>'w'</code> mode silently destroys existing file content — use <code>'x'</code> to fail if file exists (safe creation).", "Always use <code>with open(...)</code> — it guarantees file closure even if an exception occurs.", "<code>'r+'</code> mode: opens for both reading and writing without truncating — file must exist.", "Default text mode uses the platform's newline convention; use <code>'rb'</code>/<code>'wb'</code> for binary files.", "<code>encoding='utf-8'</code> should be specified explicitly for text files to avoid platform-dependent behaviour."]
      },
      "Binary vs Text Mode": {
        section: "File Handling & Serialization",
        definition: "<strong>Text mode</strong> (<code>'r'</code>, <code>'w'</code>) decodes/encodes bytes to strings using a specified encoding, and translates platform-specific newlines. <strong>Binary mode</strong> (<code>'rb'</code>, <code>'wb'</code>) reads/writes raw bytes with no encoding or newline translation.",
        internal_working: "In text mode, Python wraps the raw file with <code>TextIOWrapper</code> which calls the codec (e.g., UTF-8) to decode bytes to <code>str</code> on read and encode <code>str</code> to bytes on write. Newline translation: on Windows, <code>\\r\\n</code> is read as <code>\\n</code> (normalised). Binary mode bypasses all this — data is returned/written as <code>bytes</code> objects exactly.",
        use_case: "Binary mode: images, audio files, pickled data, any non-text file. Text mode: CSV, JSON, log files, any human-readable file. Mixing modes on the same file causes corruption.",
        key_points: ["Binary mode is mandatory for non-text files — opening an image in text mode corrupts it on Windows.", "Always specify <code>encoding='utf-8'</code> in text mode — default encoding is platform-dependent.", "<code>newline=''</code> in text mode disables newline translation — needed for the <code>csv</code> module.", "Binary files read returns <code>bytes</code>; text files return <code>str</code>.", "HTTP responses are bytes; decode with <code>response.content.decode('utf-8')</code> or use <code>response.text</code>."]
      },
      "CSV vs JSON": {
        section: "File Handling & Serialization",
        definition: "<strong>CSV</strong> (Comma-Separated Values) is a plain-text tabular format — rows of values separated by delimiters, best for flat, homogeneous data. <strong>JSON</strong> is a hierarchical key-value format supporting nested structures, arrays, and mixed types — better for semi-structured data.",
        internal_working: "CSV has no schema — all values are strings by default (type inference needed). Python's <code>csv</code> module parses/writes it row by row. JSON has a strict grammar with types (number, string, boolean, null, array, object) parsed by <code>json</code> module using a recursive descent parser. JSON is self-describing; CSV requires a header row for column names.",
        use_case: "CSV: spreadsheet data, database exports, simple logs, data science datasets (pandas <code>read_csv</code>). JSON: API responses, configuration files, document stores, nested objects.",
        key_points: ["CSV lacks a standard for data types — booleans, datetimes, nulls need convention or schema.", "JSON supports nesting; CSV is flat — representing nested data in CSV requires flattening or multiple files.", "CSV is faster to parse for large tabular data; JSON parsing has more overhead due to recursive structure.", "Use <code>csv.DictReader</code> to read CSV into dicts keyed by column headers.", "For large JSON files, use <code>ijson</code> for streaming/lazy parsing instead of loading the whole file."]
      },
      "Serialization vs Deserialization": {
        section: "File Handling & Serialization",
        definition: "<strong>Serialization</strong> (marshalling) is the process of converting an in-memory object into a format (bytes, string) that can be stored or transmitted. <strong>Deserialization</strong> (unmarshalling) is the reverse — reconstructing the in-memory object from the serialised form.",
        internal_working: "Serialization: Python object → <code>pickle.dumps(obj)</code> → bytes; or <code>json.dumps(obj)</code> → JSON string. Deserialization: bytes → <code>pickle.loads(data)</code> → Python object; JSON string → <code>json.loads(s)</code> → dict/list. The process must be symmetric and handle versioning if schemas evolve.",
        use_case: "Serialization: saving a trained ML model to disk, sending objects over a network socket, caching results in Redis. Deserialization: loading model back, receiving network messages, cache hits.",
        key_points: ["Always validate/sanitise deserialised data from untrusted sources — especially Pickle (arbitrary code execution risk).", "Schema evolution: add new fields with defaults to maintain forward/backward compatibility.", "Protocol Buffers and MessagePack are faster and more compact than JSON for high-throughput scenarios.", "Python's <code>dataclasses</code> + <code>dacite</code> or Pydantic provide type-safe deserialization with validation.", "JSON serialization is not lossless for all Python types — datetime, Decimal, custom objects need custom encoders."]
      },
      "File vs Stream": {
        section: "File Handling & Serialization",
        definition: "A <strong>file</strong> is a persistent, addressable storage entity — it has a name, fixed size, and can be accessed at arbitrary positions (seekable). A <strong>stream</strong> is a sequential, potentially unbounded flow of data — it may not be seekable and you can only read/write sequentially.",
        internal_working: "Python's file objects are streams in code — they have <code>read()</code>, <code>write()</code>, and often <code>seek()</code>/<code>tell()</code> methods. True streams (network sockets, pipes, <code>io.BytesIO</code>) are not seekable. The <code>io</code> module defines the base classes: <code>RawIOBase</code>, <code>BufferedIOBase</code>, <code>TextIOBase</code>.",
        use_case: "Seekable file: reading a binary file at specific offsets. Stream: processing network data as it arrives, piping output from one process to another. Use streaming for large data to avoid loading everything into memory.",
        key_points: ["Not all file-like objects support <code>seek()</code> — check <code>stream.seekable()</code> before calling <code>seek()</code>.", "Streaming is memory-efficient for large data — process a 10GB file line by line without loading it all.", "<code>io.StringIO</code> and <code>io.BytesIO</code> create in-memory file-like stream objects — useful for testing.", "Generators naturally model streams — produce one element at a time, consumed once.", "HTTP response bodies are streams — <code>requests.get(url, stream=True)</code> streams large downloads."]
      },
      "Buffered vs Unbuffered IO": {
        section: "File Handling & Serialization",
        definition: "<strong>Buffered IO</strong> accumulates data in a memory buffer before performing a system call — reducing the number of expensive OS transitions. <strong>Unbuffered IO</strong> performs a system call for every read/write operation — immediate but slower for many small operations.",
        internal_working: "Python's default <code>open()</code> uses buffered IO via <code>BufferedReader</code>/<code>BufferedWriter</code>. The buffer size is typically 8KB. When the buffer is full (or on flush/close), the data is written in one system call. Unbuffered: <code>open('file', 'rb', buffering=0)</code> — each read/write is a syscall. Line-buffered: <code>buffering=1</code> in text mode — flushes on newline.",
        use_case: "Buffered (default): nearly always — reduces syscalls, improves throughput. Unbuffered: real-time logging where data must appear immediately, hardware/serial IO. Use <code>flush()</code> to force a buffer dump without closing.",
        key_points: ["Default Python IO is buffered — <code>print()</code> output may not appear immediately if redirected to a file; use <code>flush=True</code>.", "Unbuffered IO is critical for subprocess communication — <code>subprocess.Popen(stdout=PIPE, bufsize=0)</code>.", "<code>sys.stdout.reconfigure(line_buffering=True)</code> for line-buffered output.", "Forgetting to <code>flush()</code> or close a file can result in incomplete output — <code>with</code> statement handles this.", "Binary mode with <code>buffering=0</code> is the only unbuffered option — text mode requires at least line buffering."]
      },
      "Local Storage vs Cloud Storage": {
        section: "File Handling & Serialization",
        definition: "<strong>Local storage</strong> refers to data stored on the local filesystem (SSD/HDD) — fast access, directly accessible via file paths, limited by hardware capacity. <strong>Cloud storage</strong> (S3, GCS, Azure Blob) stores data on remote distributed systems — highly scalable, durable, accessible over HTTP, with latency.",
        internal_working: "Local: Python's <code>open()</code>, <code>os</code>, <code>pathlib</code> directly call OS filesystem syscalls — microsecond access. Cloud: AWS S3 via <code>boto3</code> — operations involve HTTP requests over the network (milliseconds to seconds). Cloud storage has eventual consistency models and object-level (not byte-range) access, though S3 supports byte-range GET.",
        use_case: "Local: temp files, dev environments, single-machine applications. Cloud: data pipelines on distributed clusters (Spark, Dask reading from S3), static website assets, ML training datasets shared across teams.",
        key_points: ["Cloud storage is object storage — not a traditional filesystem; no true directories, just key prefixes.", "Use <code>boto3</code> for S3, <code>google-cloud-storage</code> for GCS — both support streaming uploads/downloads.", "<code>s3fs</code> and <code>gcsfs</code> provide filesystem-like interfaces over cloud storage for pandas, Dask.", "Cloud storage adds latency (~5–200ms per request) — batch operations and multipart uploads are critical for performance.", "Data locality: running computation (EC2/GCE) in the same region as your S3/GCS bucket avoids egress costs and reduces latency."]
      },
      "File System vs Database": {
        section: "File Handling & Serialization",
        definition: "A <strong>file system</strong> stores data as files/directories, accessed by paths. A <strong>database</strong> stores structured data in tables or documents, accessed via queries — providing indexing, transactions, concurrency control, and data integrity guarantees.",
        internal_working: "File systems: OS-managed, hierarchical, file-level locking only. Databases: DBMS handles ACID transactions (Atomicity, Consistency, Isolation, Durability), B-tree/hash indexes for fast queries, write-ahead logging for crash recovery. SQLite stores everything in a single file but provides full ACID and SQL. PostgreSQL/MySQL are client-server with complex storage engines.",
        use_case: "File system: storing blobs (images, videos), simple configuration, logs. Database: structured data with relationships, concurrent access, complex queries, reporting — user accounts, orders, product catalogue.",
        key_points: ["Databases provide ACID guarantees; file systems only guarantee atomic rename on most OSes.", "File system is not suitable for concurrent writes to the same file — databases handle this with transactions.", "SQLite is a great embedded database — no server needed, ACID-compliant, perfect for local apps.", "Use a database when you need queries, filtering, sorting, or joins — not when storing blobs.", "Object-relational impedance mismatch: ORMs abstract SQL but add overhead; raw SQL is faster for complex queries."]
      },
      "Structured vs Unstructured Data": {
        section: "File Handling & Serialization",
        definition: "<strong>Structured data</strong> has a predefined schema — each field has a name, type, and constraints (SQL tables, CSV with headers). <strong>Unstructured data</strong> has no predefined schema — text, images, audio, video. <strong>Semi-structured</strong> data (JSON, XML) has flexible schema without strict types.",
        internal_working: "Structured: stored in relational databases with schemas enforced by the engine. Queried with SQL — indexes make lookups O(log n). Unstructured: stored as files (BLOB in DB or file system). Queried with full-text search, ML models, or regex. Semi-structured: NoSQL document stores (MongoDB, Elasticsearch) store schema-flexible JSON documents.",
        use_case: "Structured: customer records, financial transactions, inventory. Unstructured: email bodies, social media posts, images, PDFs. Semi-structured: API responses, event logs, config files.",
        key_points: ["~80% of enterprise data is unstructured — hence the rise of NLP and computer vision.", "ELT patterns load raw unstructured data to a data lake (S3), then transform into structured form.", "pandas DataFrames are structured; MongoDB collections are semi-structured.", "Full-text search on unstructured data uses inverted indexes (Elasticsearch, PostgreSQL <code>tsvector</code>).", "Schema-on-write (SQL) vs schema-on-read (data lake) — trade flexibility for query performance."]
      },
      "Pandas DataFrame vs PySpark DataFrame": {
        section: "Advanced Python & Ecosystem",
        definition: "A <strong>Pandas DataFrame</strong> is an in-memory, single-machine tabular data structure for data manipulation — optimised for datasets that fit in RAM. A <strong>PySpark DataFrame</strong> is a distributed, immutable data structure backed by a cluster — designed for datasets too large for a single machine.",
        internal_working: "Pandas: data stored in NumPy arrays in the driver's RAM. Operations are eager and sequential. PySpark: data is logically partitioned across a cluster's nodes; operations build a DAG (Directed Acyclic Graph) of transformations that are lazily evaluated and only executed on <code>action</code> calls (<code>collect()</code>, <code>count()</code>). PySpark uses the Catalyst optimiser to generate efficient execution plans.",
        use_case: "Pandas: data exploration, EDA, preprocessing pipelines for &lt;10GB data, ML feature engineering. PySpark: ETL at petabyte scale on Databricks/EMR, processing log files from hundreds of servers.",
        key_points: ["Pandas is eager (immediate execution); PySpark is lazy (builds a plan, executes on action).", "Pandas runs on one machine; PySpark distributes across a cluster — fundamentally different architecture.", "<code>pyspark.pandas</code> (formerly Koalas) provides a Pandas-like API on top of PySpark.", "Avoid <code>spark_df.toPandas()</code> on large datasets — it collects all data to the driver, causing OOM.", "PySpark DataFrames are immutable — transformations return new DataFrames; Pandas can be modified in-place."]
      },
      "SQL vs NoSQL": {
        section: "Advanced Python & Ecosystem",
        definition: "<strong>SQL</strong> (relational) databases store data in structured tables with a fixed schema and support ACID transactions and complex joins (PostgreSQL, MySQL, SQLite). <strong>NoSQL</strong> databases use flexible schema models (document, key-value, column-family, graph) and often trade ACID for horizontal scalability and schema flexibility.",
        internal_working: "SQL: data normalised into tables, relationships via foreign keys, B-tree indexes, WAL for ACID. Queries use the SQL language with declarative execution plans. NoSQL (e.g., MongoDB): documents stored as BSON (binary JSON), no joins — related data embedded or referenced by ID. Horizontal sharding is native. Cassandra uses a wide-column model with distributed hash-based partitioning.",
        use_case: "SQL: e-commerce orders, financial records, any relational data with integrity requirements. NoSQL: user profiles (MongoDB), session data (Redis), IoT time-series (InfluxDB), social graphs (Neo4j), product catalogues with varying attributes.",
        key_points: ["SQL offers strong ACID guarantees; most NoSQL systems offer eventual consistency (BASE).", "NoSQL doesn't mean 'no SQL' — it means 'not only SQL'; many support query languages.", "Horizontal scaling is native to NoSQL (MongoDB sharding, Cassandra); SQL horizontal scaling (Citus, Vitess) is more complex.", "JOIN operations in SQL are powerful but expensive; NoSQL avoids joins by denormalising/embedding data.", "For Python: use SQLAlchemy for SQL, PyMongo for MongoDB, redis-py for Redis."]
      },
      "ORM vs Raw SQL": {
        section: "Advanced Python & Ecosystem",
        definition: "An <strong>ORM</strong> (Object-Relational Mapper) translates between Python objects and database tables, providing a Pythonic API without writing SQL directly (SQLAlchemy, Django ORM). <strong>Raw SQL</strong> executes SQL strings directly against the database using a DB driver (psycopg2, sqlite3).",
        internal_working: "ORM: maps class ↔ table, instance ↔ row. Queries are built as Python expressions that are compiled to SQL. Lazy loading, eager loading (<code>joinedload</code>), and session management are handled automatically. Raw SQL: <code>cursor.execute('SELECT ...')</code> sends the query directly; no abstraction layer.",
        use_case: "ORM: CRUD-heavy applications, migrations (<code>alembic</code>), rapid development. Raw SQL: complex queries (CTEs, window functions, lateral joins), performance-critical bulk operations, stored procedures.",
        key_points: ["ORMs prevent SQL injection by parameterising queries automatically — raw SQL must use parameters: <code>cursor.execute('...WHERE id=%s', (id,))</code>.", "ORM N+1 query problem: fetching related records in a loop without eager loading causes N+1 queries — fix with <code>joinedload</code>.", "Raw SQL is faster for bulk operations — <code>cursor.executemany()</code> vs ORM's row-by-row insert.", "SQLAlchemy Core gives SQL-expressiveness with Pythonic syntax; ORM layer adds object mapping on top.", "Know both — ORM for productivity; drop to raw SQL when the ORM-generated query is inefficient."]
      },
      "API vs Microservice": {
        section: "Advanced Python & Ecosystem",
        definition: "An <strong>API</strong> (Application Programming Interface) is a defined interface through which software components communicate — it's a contract, not an architecture. A <strong>microservice</strong> is an architectural pattern where an application is composed of small, independently deployable services, each typically exposing an API.",
        internal_working: "An API can be a function call, REST endpoint, GraphQL schema, or gRPC method — it defines the contract. A microservice is a deployable unit (typically a container) that owns its own data, runs independently, and communicates with other services via APIs (REST, gRPC, message queues). Microservices are discovered via service registry or DNS.",
        use_case: "API: any interface — a Python library's public functions are an API, so is a REST endpoint. Microservice: splitting a monolith — user-service, order-service, payment-service each deployed independently and communicating via APIs.",
        key_points: ["Every microservice has an API; not every API belongs to a microservice.", "Microservices trade operational simplicity for scalability and team autonomy.", "In Python, FastAPI/Flask/Django REST Framework are popular for building HTTP APIs.", "Service mesh (Istio, Linkerd) handles cross-cutting concerns (auth, observability, retries) for microservices.", "Start as a monolith, extract microservices when you have clear team boundaries and scaling needs (Martin Fowler's advice)."]
      },
      "Monolith vs Microservices": {
        section: "Advanced Python & Ecosystem",
        definition: "A <strong>monolith</strong> is a single deployable unit containing all application functionality — all components are tightly coupled and deployed together. <strong>Microservices</strong> decompose the application into small, independent services — each deployed, scaled, and maintained separately.",
        internal_working: "Monolith: all modules in one process — function calls for internal communication, shared database, single deployment. Microservices: inter-service communication via HTTP/gRPC/message queues — each service has its own database. Data consistency requires saga patterns or distributed transactions. Service discovery, load balancing, and circuit breaking add complexity.",
        use_case: "Monolith: early-stage startups, small teams, simple domains. Microservices: large organisations with many teams, independent scaling needs, polyglot environments (different services in different languages).",
        key_points: ["Monolith is simpler to develop, test, and deploy — start here unless you have clear reasons not to.", "Microservices introduce network latency, distributed failures, data consistency challenges, and operational overhead.", "Microservices shine for team autonomy (Conway's Law) and independent scaling (scale only the high-traffic service).", "A 'modular monolith' is a good intermediate — well-separated modules in one deployable unit.", "Distributed tracing (Jaeger, Zipkin) and centralised logging are essential for debugging microservices."]
      },
      "Batch Processing vs Stream Processing": {
        section: "Advanced Python & Ecosystem",
        definition: "<strong>Batch processing</strong> collects data over time and processes it all at once on a schedule (e.g., nightly ETL). <strong>Stream processing</strong> processes data continuously in real-time as it arrives — event-by-event or in micro-batches.",
        internal_working: "Batch: data accumulated in storage (S3, DB), then processed by Spark/pandas in a scheduled job. High throughput, higher latency (minutes to hours). Stream: data flows through Kafka/Kinesis, processed by Flink/Spark Streaming/Kafka Streams in real-time. Low latency (milliseconds to seconds), lower throughput per unit time.",
        use_case: "Batch: monthly invoices, nightly data warehouse loads, weekly ML model retraining. Stream: fraud detection on transactions as they happen, real-time dashboards, personalised recommendations during user sessions.",
        key_points: ["Lambda architecture combines batch (accurate, historical) and stream (fast, real-time) layers.", "Kappa architecture simplifies this — use stream processing for both real-time and historical data reprocessing.", "Batch jobs are easier to develop, test, and debug; stream processing requires handling late/out-of-order data.", "Watermarking in stream processing defines how long to wait for late-arriving events.", "Apache Spark supports both batch and micro-batch streaming (Structured Streaming); Flink is a true stream-first engine."]
      },
      "ETL vs ELT": {
        section: "Advanced Python & Ecosystem",
        definition: "<strong>ETL</strong> (Extract, Transform, Load) extracts data from sources, transforms it in an intermediate layer, then loads clean data into the target warehouse. <strong>ELT</strong> (Extract, Load, Transform) loads raw data directly into the warehouse first, then transforms it using the warehouse's own compute power.",
        internal_working: "ETL: transformation happens in a separate ETL engine (Spark, pandas, dbt outside the warehouse) — requires ETL server compute. ELT: data lands in the warehouse (Snowflake, BigQuery, Redshift) as-is; SQL-based transformation runs inside the warehouse using its massive parallel processing. Cloud data warehouses made ELT viable — cheap storage + powerful SQL compute.",
        use_case: "ETL: sensitive data that must be cleansed/masked before entering the warehouse, resource-constrained environments, legacy systems. ELT: modern cloud warehouses — load all raw data to S3/Snowflake, transform with dbt. ELT is the dominant modern pattern.",
        key_points: ["ELT is the modern standard for cloud data warehouses — cheaper storage makes raw-first loading viable.", "dbt (data build tool) is the dominant ELT transformation layer — SQL models with testing and documentation.", "ETL is better when transformation is complex, stateful, or data must not land in raw form (PII).", "ELT allows re-running transformations on historical raw data — impossible if ETL discards intermediate data.", "Airflow/Prefect/Dagster are orchestration tools for both ETL and ELT pipeline scheduling."]
      },
      "Docker vs Virtual Machine": {
        section: "Advanced Python & Ecosystem",
        definition: "A <strong>Docker container</strong> packages an application with its dependencies into a portable, isolated unit that shares the host OS kernel — lightweight and fast. A <strong>Virtual Machine</strong> emulates a complete physical machine with its own OS kernel — fully isolated but heavier.",
        internal_working: "Docker uses Linux kernel features: <strong>namespaces</strong> (isolate PID, network, filesystem) and <strong>cgroups</strong> (limit CPU, memory). Containers share the host kernel — no OS boot required. VMs use a hypervisor (VMware, VirtualBox, KVM) to emulate hardware and run a full OS — much more overhead (gigabytes of RAM, seconds to boot).",
        use_case: "Docker: microservice deployment, CI/CD pipelines, reproducible development environments (<code>docker-compose</code>). VM: running a different OS on the same hardware (Windows on Mac), complete isolation for security-sensitive workloads.",
        key_points: ["Container startup: milliseconds; VM startup: seconds to minutes.", "Containers share the host OS kernel — not suitable for running a different OS kernel (e.g., Windows container on Linux host).", "<code>Dockerfile</code> defines the image; <code>docker-compose.yml</code> orchestrates multi-container apps.", "Kubernetes orchestrates containers at scale — scheduling, scaling, self-healing.", "Security: VMs provide stronger isolation (separate kernel); containers can escape via kernel vulnerabilities."]
      },
      "REST vs GraphQL": {
        section: "Advanced Python & Ecosystem",
        definition: "<strong>REST</strong> (Representational State Transfer) is an architectural style using fixed URL endpoints for resources, with HTTP verbs (GET, POST, PUT, DELETE). <strong>GraphQL</strong> is a query language and runtime for APIs where clients specify exactly what data they need in a single request, sent to a single endpoint.",
        internal_working: "REST: each resource has a URL; server defines response shape. Clients may need multiple round-trips for related data. GraphQL: a single <code>/graphql</code> endpoint accepts queries; the schema defines types and resolvers. The server returns exactly the requested fields — no over/under-fetching. The schema is introspectable at runtime.",
