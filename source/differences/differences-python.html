        definition: "A <strong>shallow copy</strong> creates a new object but inserts references to the objects found in the original. A <strong>deep copy</strong> creates a new object and recursively copies all nested objects inside it. In Python, <code>copy.copy()</code> gives a shallow copy while <code>copy.deepcopy()</code> gives a deep copy.",
        internal_working: "Shallow copy uses <code>PyObject_Copy</code> internally which duplicates the top-level container but leaves inner object pointers unchanged — both copies share the same inner objects. Deep copy uses a memo dictionary to track already-copied objects (avoiding infinite loops on circular references) and recursively allocates new memory for every nested object in the hierarchy.",

        key_points: ["Tuples are hashable (if all elements are hashable) so they can be used as dictionary keys; lists cannot.", "Tuples consume less memory than equivalent lists because there's no over-allocation headroom.", "Tuple creation and iteration is slightly faster than list due to fixed-size allocation and CPython's free-list optimization.", "<code>list</code> has many mutation methods (<code>append</code>, <code>remove</code>, <code>sort</code>); tuple only has <code>count</code> and <code>index</code>.", "A tuple with one element needs a trailing comma: <code>(1,)</code> — without it, <code>(1)</code> is just an integer."]

        internal_working: "Lists are contiguous dynamic arrays. Sets are implemented as hash tables (<code>PySetObject</code>) where each element's hash determines its bucket. On insertion, Python computes <code>hash(element)</code> and finds the correct slot; collisions are resolved via open addressing. This gives O(1) average-case membership testing vs O(n) for lists.",
        use_case: "Use <strong>list</strong> when order matters or duplicates are needed — e.g., storing a sequence of log messages. Use <strong>set</strong> when you need fast membership testing or deduplication — e.g., <code>unique_ids = set(all_ids)</code> removes duplicates instantly, or <code>if user_id in active_set</code> is O(1) vs O(n) for a list.",
        key_points: ["Set membership test <code>in</code> is O(1) on average; list <code>in</code> is O(n) — critical for large-scale lookups.", "Sets require elements to be hashable — you cannot store lists or dicts in a set.", "Sets support mathematical operations: <code>union(|)</code>, <code>intersection(&)</code>, <code>difference(-)</code>, <code>symmetric_difference(^)</code>.", "Converting a list to a set removes duplicates but loses order; converting back gives unpredictable ordering.", "Sets use more memory per element than lists due to the hash table overhead and load-factor (~66%) constraint."]

        key_points: ["Dict lookup by key is O(1); list lookup by value is O(n) — always use a dict when you'll frequently look up by a non-positional identifier.", "Dictionary keys must be hashable; values can be any type including mutable ones.", "Python 3.7+ guarantees dict insertion order as part of the language spec (not just CPython implementation).", "Dicts use roughly 3× more memory than a list of the same number of items due to hash table overhead.", "<code>dict.get(key, default)</code> is safer than <code>dict[key]</code> which raises <code>KeyError</code> on missing keys."]

      "`is` vs `==`": {

        definition: "<code>==</code> is the <strong>equality operator</strong> — it checks whether two objects have the same value by calling <code>__eq__</code>. <code>is</code> is the <strong>identity operator</strong> — it checks whether two variables point to the exact same object in memory (same <code>id()</code>).",
        internal_working: "<code>is</code> compiles to a single pointer comparison in CPython: <code>obj1 == obj2</code> at the C pointer level. <code>==</code> triggers the object's <code>__eq__</code> method, which for built-in types can involve element-by-element comparison. Due to CPython's interning of small integers (-5 to 256) and short strings, <code>is</code> can return <code>True</code> for these even when you might not expect it — this is an implementation detail, not a language guarantee.",
        use_case: "Use <code>is</code> to check against singletons: <code>if x is None</code>, <code>if x is True</code>, <code>if x is False</code> — PEP 8 mandates this. Use <code>==</code> for value comparison: <code>if result == expected</code>, comparing two lists, strings, or custom objects by value.",
        key_points: ["Always use <code>is None</code> / <code>is not None</code> — never <code>== None</code>; a custom object could override <code>__eq__</code> to return <code>True</code> when compared with <code>None</code>.", "Small integers (-5 to 256) are interned by CPython, so <code>a is b</code> may be <code>True</code> — this is an implementation quirk, never rely on it.", "<code>is</code> is faster than <code>==</code> because it skips method dispatch entirely.", "Two separate empty lists have the same value (<code>[] == []</code> is <code>True</code>) but are different objects (<code>[] is []</code> is <code>False</code>).", "Using <code>is</code> to compare strings or numbers (other than singletons) is a code smell and may cause subtle bugs."]

      "`append()` vs `extend()`": {
        section: "Core Python Basics",
        definition: "<code>list.append(x)</code> adds a <strong>single element</strong> <code>x</code> to the end of the list — if <code>x</code> is itself an iterable (like a list), it is added as a single nested element. <code>list.extend(iterable)</code> iterates over its argument and adds each element individually to the end of the list.",
        internal_working: "<code>append</code> calls CPython's <code>list_append</code> which checks capacity, potentially reallocates (with over-allocation), then sets <code>list[n] = item</code> — O(1) amortized. <code>extend</code> calls <code>list_extend</code> which pre-computes the total new size using <code>__len__</code> hint, reallocates once, then copies elements — also O(k) where k is the length of the iterable, but avoids repeated reallocations.",
        use_case: "Use <code>append</code> to add one item: <code>my_list.append(42)</code> or <code>my_list.append([1,2])</code> (adds the list as a nested element). Use <code>extend</code> to merge another iterable: <code>my_list.extend([1, 2, 3])</code> — equivalent to <code>my_list += [1, 2, 3]</code>.",

      "`remove()` vs `pop()`": {
        section: "Core Python Basics",
        definition: "<code>list.remove(value)</code> finds the <strong>first occurrence</strong> of a specified value and removes it — it operates by value. <code>list.pop(index)</code> removes and <strong>returns</strong> the element at a specified index (defaults to the last element if no index given) — it operates by position.",
        internal_working: "<code>remove</code> performs a linear scan O(n) to find the first matching element, then shifts all subsequent elements left — overall O(n). <code>pop()</code> (from end) is O(1) since no shifting is needed. <code>pop(i)</code> for arbitrary index is O(n) because elements after index <code>i</code> must be shifted left to fill the gap.",

        key_points: ["<code>remove</code> raises <code>ValueError</code> if the value is not found; always guard with <code>if x in list</code> or use a try/except.", "<code>pop</code> raises <code>IndexError</code> if the index is out of range or the list is empty.", "<code>pop()</code> without arguments removes the last element — this is the standard stack (LIFO) operation.", "<code>remove</code> only removes the first occurrence — to remove all occurrences use a list comprehension: <code>[x for x in lst if x != val]</code>.", "Both modify the list in-place; <code>pop</code> returns the removed element, <code>remove</code> returns <code>None</code>."]
      },
      "`del` vs `remove()`": {
        section: "Core Python Basics",
        definition: "<code>del list[i]</code> is a Python statement that deletes an element by <strong>index</strong> (or a slice) and does not return anything. <code>list.remove(value)</code> is a method that deletes the first occurrence of a <strong>value</strong> and also returns <code>None</code>. <code>del</code> can also delete entire variables or dictionary keys.",
        internal_working: "<code>del list[i]</code> triggers <code>__delitem__</code> on the list which shifts elements left — O(n). <code>del var</code> removes the name binding from the current namespace's <code>__dict__</code>. <code>remove()</code> first does a linear search then shifts elements — also O(n). <code>del list[i:j]</code> (slice deletion) can remove a range in one operation, more efficient than multiple <code>remove</code> calls.",

        key_points: ["<code>del</code> is a statement (keyword), not a method — it can operate on variables, dict keys, object attributes, and list slices.", "<code>del list[i]</code> and <code>list.pop(i)</code> both remove by index but <code>pop</code> returns the element; <code>del</code> does not.", "<code>del var</code> decrements the object's reference count; if it reaches 0, the garbage collector frees the memory.", "<code>remove()</code> searches linearly and removes only the first match; <code>del</code> goes directly to the position — no search.", "Using <code>del</code> in a loop while iterating is dangerous; always iterate over a copy or use a list comprehension."]
      },
      "`*args` vs `**kwargs`": {
        section: "Functions & Arguments",
        definition: "<code>*args</code> allows a function to accept any number of <strong>positional arguments</strong>, collecting them into a tuple. <code>**kwargs</code> allows a function to accept any number of <strong>keyword arguments</strong>, collecting them into a dictionary. Both are conventions — the names <code>args</code>/<code>kwargs</code> are just the standard, the <code>*</code> and <code>**</code> operators are what matter.",
        internal_working: "When Python's bytecode calls a function with <code>CALL_FUNCTION_EX</code>, the interpreter unpacks the extra positional arguments into a <code>tuple</code> bound to the <code>*args</code> parameter, and extra keyword arguments into a <code>dict</code> bound to <code>**kwargs</code>. At the call site, <code>*iterable</code> unpacks any iterable as positional args, and <code>**mapping</code> unpacks a mapping as keyword args.",
        use_case: "Use <code>*args</code> for variadic positional functions like <code>def total(*nums): return sum(nums)</code>. Use <code>**kwargs</code> for flexible keyword APIs like <code>def create_user(**info): db.insert(info)</code>. Both are common in decorators: <code>def wrapper(*args, **kwargs): return fn(*args, **kwargs)</code>.",
        key_points: ["Order matters: <code>def f(a, b, *args, **kwargs)</code> — regular params first, then <code>*args</code>, then keyword-only params, then <code>**kwargs</code>.", "<code>*args</code> is always a tuple (immutable); <code>**kwargs</code> is always a dict.", "You can use <code>*</code> in a function signature to force all following parameters to be keyword-only: <code>def f(a, *, b)</code>.", "At the call site, <code>*list</code> unpacks a list as positional args and <code>**dict</code> unpacks a dict as keyword args — the inverse operation.", "Avoid mutable default arguments — <code>def f(x, data=[])</code> is a trap; the list is created once at definition time."]
      },
      "Positional vs Keyword Arguments": {
        section: "Functions & Arguments",
        definition: "<strong>Positional arguments</strong> are passed in the order they are defined — the value is matched to the parameter by position. <strong>Keyword arguments</strong> are passed as <code>name=value</code> pairs, explicitly naming which parameter receives the value, making order irrelevant.",
        internal_working: "Python's function call mechanism (in <code>ceval.c</code>) maps positional args first by index, then processes keyword args by name lookup against the function's <code>co_varnames</code>. Positional-only parameters (marked with <code>/</code> in the signature since Python 3.8) cannot be passed by keyword. Keyword-only parameters (after <code>*</code> in the signature) cannot be passed positionally.",
        use_case: "Use positional args for simple, short functions: <code>range(0, 10, 2)</code>. Use keyword args for clarity when calling functions with many parameters: <code>pd.read_csv('file.csv', sep=';', header=0, encoding='utf-8')</code> — much more readable and less error-prone.",
        key_points: ["Keyword arguments improve readability and reduce bugs when a function has many parameters or boolean flags.", "Python 3.8 introduced positional-only params using <code>/</code>: <code>def f(a, b, /, c)</code> — <code>a</code> and <code>b</code> cannot be passed by keyword.", "Parameters after <code>*</code> in a signature are keyword-only: <code>def f(a, *, b)</code> — <code>b</code> must be passed as <code>f(1, b=2)</code>.", "You can mix: <code>f(1, 2, c=3)</code> is valid; but once a keyword arg is used, all subsequent args must also be keyword args.", "Keyword arguments are resolved at call time, not at definition time — defaults are evaluated at definition time (default argument trap)."]
      },

        definition: "<strong>Default arguments</strong> have a predefined value specified in the function signature (<code>def f(x, n=10)</code>) and are optional when calling the function. <strong>Non-default (required) arguments</strong> have no default value and must always be provided by the caller.",
        internal_working: "Default values are stored in the function object's <code>__defaults__</code> tuple (for positional defaults) and <code>__kwdefaults__</code> dict (for keyword-only defaults) at function definition time — once. This means mutable defaults like <code>[]</code> or <code>{}</code> are created once and shared across all calls, which is a classic Python gotcha.",
        use_case: "Use default args for optional configuration: <code>def connect(host, port=5432, timeout=30)</code>. Use non-default args for required inputs that have no sensible default: <code>def send_email(to, subject, body)</code>.",
        key_points: ["The mutable default argument trap: <code>def f(lst=[])</code> — the same list object is reused across calls. Fix with <code>def f(lst=None): lst = lst or []</code>.", "Default arguments must come after non-default ones in the signature, or you'll get a <code>SyntaxError</code>.", "Default values are evaluated once at function definition time, not each time the function is called.", "Use <code>None</code> as a sentinel default and initialise inside the function body to avoid the mutable default trap.", "You can inspect defaults with <code>fn.__defaults__</code> and <code>fn.__kwdefaults__</code>."]
      },
      "Lambda vs Normal Function": {
        section: "Functions & Arguments",
        definition: "A <strong>lambda</strong> is an anonymous, single-expression function defined with the <code>lambda</code> keyword. A <strong>normal function</strong> is defined with <code>def</code>, can span multiple lines, have a docstring, multiple statements, and complex logic.",
        internal_working: "Both <code>lambda</code> and <code>def</code> create function objects (<code>PyFunctionObject</code>) at runtime and both support closures. Lambdas are syntactically restricted to a single expression whose result is implicitly returned. They are compiled to the same bytecode type as regular functions — the difference is purely syntactic. Both support default arguments: <code>lambda x, y=10: x + y</code>.",
        use_case: "Use lambda for short, throwaway functions passed inline: <code>sorted(data, key=lambda x: x['age'])</code>, <code>map(lambda x: x*2, nums)</code>. Use <code>def</code> for anything that needs a name for reuse, documentation, error tracebacks, or multiple statements.",
        key_points: ["Lambdas cannot contain statements (<code>if/else</code> as expressions are ok: <code>lambda x: x if x > 0 else -x</code>), assignments, or loops.", "For simple callbacks, lambda is fine; PEP 8 recommends against assigning a lambda to a variable (<code>f = lambda x: x+1</code>) — just use <code>def</code> instead.", "Lambda functions show as <code>&lt;lambda&gt;</code> in tracebacks which makes debugging harder.", "Both support closures — capturing variables from the enclosing scope.", "Prefer <code>operator</code> module functions over lambdas for common ops: <code>operator.itemgetter('age')</code> is faster than <code>lambda x: x['age']</code>."]
      },
      "Recursive vs Iterative Function": {
        section: "Functions & Arguments",
        definition: "A <strong>recursive function</strong> calls itself to solve a smaller sub-problem, using the call stack to maintain state. An <strong>iterative function</strong> uses explicit loops (<code>for</code>/<code>while</code>) to repeat operations, maintaining state through variables.",
        internal_working: "Each recursive call pushes a new frame onto CPython's call stack. Python has a default recursion limit of 1000 frames (<code>sys.getrecursionlimit()</code>) to prevent stack overflow. CPython does not perform tail-call optimisation. Iterative functions reuse a single stack frame, so they handle arbitrary input sizes without stack overflow risk and are generally faster due to no frame allocation overhead.",
        use_case: "Use recursion for naturally recursive structures: tree traversal, DFS on graphs, Fibonacci with memoisation. Use iteration for sequential operations: summing a list, processing a file line by line. When in doubt, prefer iteration in Python for performance and safety.",
        key_points: ["Python does not support tail-call optimisation — even a tail-recursive function grows the stack.", "Python's default recursion limit is 1000; increase with <code>sys.setrecursionlimit(n)</code> but do so carefully.", "Recursion has overhead: frame creation, function call dispatch. Iteration is generally faster in Python.", "Any recursive algorithm can be converted to iterative using an explicit stack (list simulating the call stack).", "Deep recursion on large inputs (e.g., linked list of 10,000 nodes) will raise <code>RecursionError</code>."]
      },
      "Generator vs Function": {
        section: "Functions & Arguments",
        definition: "A <strong>regular function</strong> runs to completion and returns a single value. A <strong>generator function</strong> uses <code>yield</code> to produce a sequence of values lazily, suspending and resuming its state between calls. Generator functions return a generator object when called.",
        internal_working: "When a generator function is called, Python creates a <code>PyGenObject</code> containing the code object and frame state but does not execute any code. Each call to <code>next()</code> resumes execution from the last <code>yield</code> point. The frame's local variables and instruction pointer are preserved between <code>next()</code> calls. When the function returns or exhausts, a <code>StopIteration</code> is raised.",
        use_case: "Use generators for large or infinite sequences where you don't want to hold everything in memory: reading large files line-by-line, infinite counters, pipelines. E.g., <code>def read_chunks(file, size=1024): while chunk := file.read(size): yield chunk</code>.",
        key_points: ["Calling a generator function does not execute it — it returns a generator object; execution begins on the first <code>next()</code> call.", "Generators are memory-efficient: they produce one item at a time rather than building the entire collection.", "Generator state (local variables, instruction pointer) is preserved between <code>next()</code> calls.", "A generator can only be iterated once — after exhaustion it raises <code>StopIteration</code> permanently; create a new one to re-iterate.", "<code>yield from iterable</code> delegates to a sub-generator, enabling generator composition."]
      },
      "Yield vs Return": {
        section: "Functions & Arguments",
        definition: "<code>return</code> terminates a function and sends back a single value to the caller, after which the function's state is destroyed. <code>yield</code> suspends the function, sends a value to the caller, and preserves the function's state so it can be resumed from where it left off.",
        internal_working: "<code>return</code> executes the <code>RETURN_VALUE</code> bytecode instruction, pops the current frame off the call stack, and transfers control back to the caller. <code>yield</code> executes <code>YIELD_VALUE</code>, suspends the frame (without popping it) and returns the value; the frame remains on the heap inside the generator object. The next <code>next()</code> call re-activates the frame from the suspended instruction.",
        use_case: "Use <code>return</code> when the function computes a single result: <code>def square(n): return n * n</code>. Use <code>yield</code> when the function produces a stream of values: <code>def countdown(n): while n > 0: yield n; n -= 1</code>.",
        key_points: ["A function containing at least one <code>yield</code> statement is automatically a generator function, even if <code>yield</code> is never actually reached at runtime.", "<code>return value</code> inside a generator sets the value of the <code>StopIteration</code> exception, not a yielded value.", "<code>yield</code> can also receive values: <code>val = yield item</code> — used with <code>gen.send(value)</code> for coroutines.", "A regular function that <code>return</code>s without a value returns <code>None</code>; a generator that finishes raises <code>StopIteration</code>.", "You cannot use <code>yield</code> and <code>return value</code> in the same function in Python 2; in Python 3 it is allowed (the return value becomes the StopIteration value)."]
      },
      "Higher-order Function vs Normal Function": {
        section: "Functions & Arguments",
        definition: "A <strong>higher-order function</strong> either accepts other functions as arguments, returns a function, or both. A <strong>normal function</strong> only operates on data values. Higher-order functions are a core concept of functional programming.",
        internal_working: "In Python, functions are first-class objects (<code>PyFunctionObject</code>) — they can be stored in variables, passed as arguments, and returned like any other value. Higher-order functions receive function objects and call them via the standard <code>CALL_FUNCTION</code> bytecode. There is no runtime difference in how function calls work regardless of whether a function is passed as data or called normally.",
        use_case: "Built-in HOFs: <code>map(func, iterable)</code>, <code>filter(func, iterable)</code>, <code>sorted(data, key=func)</code>. Custom: decorators (<code>def decorator(fn): ...</code>), callbacks, and factory functions that return closures: <code>def multiplier(n): return lambda x: x * n</code>.",
        key_points: ["Decorators in Python are syntactic sugar for higher-order functions: <code>@decorator</code> is equivalent to <code>fn = decorator(fn)</code>.", "<code>functools.partial</code> returns a new function with some arguments pre-filled — a higher-order function for currying.", "<code>map</code>, <code>filter</code>, and <code>sorted</code> are the classic HOFs — prefer list comprehensions/generator expressions for clarity in most cases.", "Returning a closure (inner function) from a factory function is a common HOF pattern for creating configurable behaviour.", "HOFs enable the Strategy and Decorator design patterns without subclassing."]
      },
      "Pure Function vs Impure Function": {
        section: "Functions & Arguments",
        definition: "A <strong>pure function</strong> always produces the same output for the same input and has no side effects (does not modify any external state). An <strong>impure function</strong> may return different results for the same input or has side effects such as modifying global state, writing to a file, or mutating arguments.",
        internal_working: "Python does not enforce purity at the language level — it is a design concept. Pure functions only use their parameters and local variables. They are referentially transparent — you can replace a function call with its result without changing program behaviour. Impure functions interact with mutable state: global variables, file I/O, network calls, random number generators, or modify passed-in mutable objects.",
        use_case: "Pure: <code>def add(a, b): return a + b</code> — safe to cache, parallelise, and test. Impure: <code>def save_user(user): db.insert(user)</code> — necessary for real applications. Use pure functions wherever possible for business logic; isolate impure functions at the boundaries (I/O layer).",
        key_points: ["Pure functions are trivially unit-testable — no mocking needed, just call with inputs and check outputs.", "Pure functions are safe to cache with <code>functools.lru_cache</code> — same input always yields same output.", "Impure functions are necessary for anything real (I/O, state), but should be isolated and kept at application boundaries.", "Modifying a mutable argument makes a function impure — it creates a hidden side effect visible to the caller.", "Functional programming encourages maximising pure functions and pushing impure operations to the edges of the system."]
      },
      "Function vs Method": {
        section: "Functions & Arguments",
        definition: "A <strong>function</strong> is a standalone callable defined with <code>def</code> at module level or inside another function. A <strong>method</strong> is a function defined inside a class body — it is associated with an object and receives a reference to that object as its first argument (<code>self</code> for instance methods, <code>cls</code> for class methods).",
        internal_working: "When you access a method via an instance (<code>obj.method</code>), Python's descriptor protocol creates a <strong>bound method object</strong> that wraps the underlying function and binds <code>self</code> to <code>obj</code>. This is why <code>type(obj.method)</code> is <code>method</code> while <code>type(MyClass.method)</code> is <code>function</code>. The binding happens via <code>__get__</code> on the function descriptor.",
        use_case: "Use a function for utility operations not tied to a class: <code>def parse_date(s): ...</code>. Use a method for behaviour tied to an object's state: <code>class BankAccount: def deposit(self, amount): self.balance += amount</code>.",
        key_points: ["Instance methods implicitly receive <code>self</code>; you must pass <code>self</code> explicitly only when calling via the class: <code>MyClass.method(obj)</code>.", "Static methods (<code>@staticmethod</code>) are functions inside a class that don't receive <code>self</code> or <code>cls</code> — essentially namespaced functions.", "Class methods (<code>@classmethod</code>) receive <code>cls</code> (the class) instead of the instance — useful for factory methods and alternative constructors.", "Unbound methods no longer exist in Python 3 — <code>MyClass.method</code> is just a plain function.", "The descriptor protocol (<code>__get__</code>, <code>__set__</code>, <code>__delete__</code>) is the mechanism behind method binding and properties."]
      },
      "List vs NumPy Array": {
        section: "Data Structures & Internals",
        definition: "A Python <strong>list</strong> is a general-purpose, dynamically-typed ordered collection that can hold any mix of Python objects. A <strong>NumPy array</strong> is a fixed-type, homogeneous, n-dimensional array stored in a contiguous block of C memory, designed for high-performance numerical computation.",
        internal_working: "A Python list stores an array of pointers to PyObjects — each element can be a different type. NumPy arrays store raw numeric data (e.g., 64-bit floats) in a single contiguous memory block (a C array), described by a dtype, shape, and strides. Operations on NumPy arrays are dispatched to optimised C or Fortran routines, and many operations support SIMD vectorisation. This avoids Python object overhead and interpreter loops entirely.",
        use_case: "Use <strong>list</strong> for heterogeneous data, small datasets, or non-numeric objects. Use <strong>NumPy array</strong> for large numerical datasets where you need vectorised operations: <code>arr * 2</code> applies to all elements without a Python loop — critical for data science, ML, image processing.",
        key_points: ["NumPy element-wise operations can be 10–100× faster than equivalent Python loops due to C-level execution and SIMD.", "NumPy arrays are fixed-size at creation (shape is immutable though you can reshape); lists are dynamic.", "NumPy arrays have a single dtype; mixing types forces up-casting (e.g., int and float becomes float).", "Broadcasting rules allow operations between arrays of different (but compatible) shapes — no equivalent in lists.", "Memory: NumPy array of 1M float64 ≈ 8 MB; equivalent Python list ≈ 8–35 MB due to PyObject overhead."]
      },
      "Array vs Linked List": {
        section: "Data Structures & Internals",
        definition: "An <strong>array</strong> stores elements in a contiguous block of memory, enabling O(1) index-based access. A <strong>linked list</strong> stores elements as nodes where each node holds data and a pointer to the next node, enabling O(1) insertion/deletion at known positions but O(n) access by index.",
        internal_working: "Arrays compute the address of element <code>i</code> as <code>base_addr + i * element_size</code> — pure arithmetic, O(1), cache-friendly. Linked list nodes are scattered in heap memory; traversal follows pointers one by one — poor cache locality (pointer chasing). Python's <code>list</code> is implemented as a dynamic array. <code>collections.deque</code> is a doubly-linked list of fixed-size blocks.",
        use_case: "Use array/list for random access, sorting, and when you know the size upfront. Use linked list (deque) when you need frequent O(1) insertions/deletions at both ends — e.g., implementing a queue: <code>from collections import deque; q = deque(); q.appendleft(x); q.pop()</code>.",
        key_points: ["Python's <code>list</code> is actually a dynamic array, not a linked list — <code>list[i]</code> is O(1).", "<code>collections.deque</code> is Python's linked-list-backed structure — O(1) append/pop from both ends.", "Inserting at the middle of a list is O(n) (shifting elements); inserting into a linked list at a known position is O(1).", "Arrays have better cache performance due to memory locality; linked lists suffer from pointer chasing.", "In Python you rarely implement a raw linked list; use <code>deque</code> for O(1) double-ended operations."]
      },
      "Stack vs Queue": {
        section: "Data Structures & Internals",
        definition: "A <strong>stack</strong> is a LIFO (Last-In, First-Out) data structure — the last element added is the first one removed. A <strong>queue</strong> is a FIFO (First-In, First-Out) data structure — the first element added is the first one removed.",
        internal_working: "In Python, a <code>list</code> can simulate a stack using <code>append</code> (push) and <code>pop()</code> (pop from end) — both O(1) amortized. For a queue, using <code>list.pop(0)</code> is O(n) due to element shifting — always use <code>collections.deque</code> which is a doubly-linked list structure offering O(1) <code>append</code> and <code>popleft</code>. <code>queue.Queue</code> is thread-safe.",
        use_case: "Stack: function call management, undo/redo history, DFS traversal, balanced parentheses checking. Queue: BFS traversal, task scheduling, message passing, print spooler.",
        key_points: ["Use <code>list</code> as a stack (append/pop from the end); use <code>collections.deque</code> as a queue (append/popleft).", "Never use <code>list.pop(0)</code> as a queue — it's O(n); <code>deque.popleft()</code> is O(1).", "<code>queue.Queue</code> is thread-safe and supports <code>put()</code>/<code>get()</code> with optional blocking — use for producer-consumer in threading.", "<code>collections.deque</code> can function as both stack and queue (double-ended).", "Python's recursion stack is literally a call stack (LIFO) — each recursive call pushes a frame."]
      },
      "Queue vs Deque": {
        section: "Data Structures & Internals",
        definition: "A <strong>queue</strong> is an abstract FIFO data structure. Python's <code>queue.Queue</code> is a thread-safe implementation. A <strong>deque</strong> (<code>collections.deque</code>) is a double-ended queue that supports O(1) append and pop from both ends — it is more general and more performant for single-threaded use.",
        internal_working: "<code>collections.deque</code> is implemented as a doubly-linked list of fixed-size blocks (64 elements per block) in CPython — this gives O(1) operations at both ends with good memory locality within blocks. <code>queue.Queue</code> wraps a <code>deque</code> internally but adds mutex locks and condition variables (<code>threading.Condition</code>) for thread safety, adding overhead.",
        use_case: "Use <code>deque</code> for single-threaded BFS, sliding-window problems, or any double-ended operations: <code>window = deque(maxlen=k)</code> automatically drops oldest element. Use <code>queue.Queue</code> in multi-threaded producers-consumers where thread safety is needed.",
        key_points: ["<code>deque</code> has O(1) append/pop from both ends; <code>list</code> is O(n) for operations at the front.", "<code>deque(maxlen=n)</code> is a circular buffer — appending when full automatically discards from the opposite end.", "<code>queue.Queue</code> provides blocking <code>get()</code> — a thread will wait until an item is available, useful for worker threads.", "<code>deque</code> index access <code>d[i]</code> is O(n); it is not designed for random access.", "For single-threaded code, always prefer <code>deque</code> over <code>queue.Queue</code> for performance."]
      },
      "Heap vs Stack Memory": {
        section: "Data Structures & Internals",
        definition: "<strong>Stack memory</strong> is a LIFO region allocated automatically for function call frames — it stores local variables and return addresses, is fast, and is automatically freed when a function returns. <strong>Heap memory</strong> is a larger region for dynamic allocation; objects live here as long as references to them exist.",
        internal_working: "In CPython, all Python objects (ints, lists, dicts, class instances) are allocated on the heap via Python's memory allocator (built on <code>malloc</code>). The C call stack holds the CPython interpreter's own frame pointers, not Python objects themselves. CPython uses reference counting plus a cyclic garbage collector to free heap objects. Stack frames for Python functions are also heap-allocated as <code>PyFrameObject</code>.",
        use_case: "Understanding this is essential for diagnosing memory leaks (objects not freed due to circular references), deciding when to use <code>__slots__</code> to reduce heap fragmentation, and understanding why Python is memory-heavy compared to C for the same data structures.",
        key_points: ["Unlike C/C++, Python programmers don't directly manage stack vs heap — CPython allocates everything on the heap.", "Stack overflow in Python is called <code>RecursionError</code> — it's the C stack for interpreter frames, not Python objects.", "Python's reference counting frees most objects immediately when they go out of scope — no GC pause for non-circular references.", "The cyclic garbage collector handles circular references that reference counting alone cannot break.", "<code>sys.getsizeof(obj)</code> returns the size of an object's heap allocation in bytes."]
      },
      "OrderedDict vs Dict": {
        section: "Data Structures & Internals",
        definition: "<code>collections.OrderedDict</code> is a dict subclass that explicitly tracks insertion order and provides order-specific methods. A regular <code>dict</code> in Python 3.7+ also maintains insertion order as a language guarantee, making <code>OrderedDict</code> mostly redundant for basic use — but <code>OrderedDict</code> provides extra features.",
        internal_working: "<code>OrderedDict</code> maintains a doubly-linked list of keys in addition to the hash table, enabling O(1) <code>move_to_end()</code> operations. Regular <code>dict</code>'s insertion-order preservation (since 3.7) is implemented via a compact array of indices — it preserves order but cannot efficiently reorder. <code>OrderedDict</code> equality also considers order; <code>dict</code> equality ignores order.",
        use_case: "Use <code>OrderedDict</code> when order-aware operations are needed: LRU cache implementation (<code>move_to_end</code>), or when equality must be order-sensitive. Use regular <code>dict</code> for everything else — it's faster and uses less memory.",
        key_points: ["Since Python 3.7, regular <code>dict</code> is insertion-ordered — you rarely need <code>OrderedDict</code> just for ordering.", "<code>OrderedDict</code> has <code>move_to_end(key, last=True)</code> — critical for LRU cache; regular dict lacks this.", "<code>OrderedDict({'a':1,'b':2}) != OrderedDict({'b':2,'a':1})</code>; but <code>{'a':1,'b':2} == {'b':2,'a':1}</code> is <code>True</code>.", "<code>OrderedDict</code> uses more memory and is slightly slower than <code>dict</code> due to the linked list overhead.", "<code>functools.lru_cache</code> internally uses an <code>OrderedDict</code>-like structure for O(1) eviction."]
      },
      "FrozenSet vs Set": {
        section: "Data Structures & Internals",
        definition: "A <strong>set</strong> is a mutable, unordered collection of unique hashable elements. A <strong>frozenset</strong> is an immutable version of a set — once created, elements cannot be added or removed. Because it is immutable, a frozenset is hashable and can be used as a dict key or set element.",
        internal_working: "Both are implemented as hash tables in CPython (<code>PySetObject</code>). The key difference is that <code>frozenset</code> has no methods that modify the internal hash table (<code>add</code>, <code>remove</code>, <code>discard</code> are absent). Because its hash value is computed once and cached in the object header, frozenset lookup as a dict key is O(1).",
        use_case: "Use <code>frozenset</code> when you need an immutable set as a dict key or inside another set: <code>graph = {frozenset({1,2}): 'edge_data'}</code>. Use <code>set</code> when you need to add/remove elements dynamically.",
        key_points: ["<code>frozenset</code> is hashable — it can be a dict key or a set element; regular <code>set</code> cannot.", "Both support set operations (<code>union</code>, <code>intersection</code>, etc.) and both can be mixed: <code>frozenset({1,2}) | {3,4}</code> returns a <code>frozenset</code>.", "<code>frozenset()</code> (empty) is falsy; so is <code>set()</code>.", "Use <code>frozenset</code> as a safe cache key for sets: <code>cache[frozenset(inputs)] = result</code>.", "<code>frozenset</code> is the set equivalent of <code>tuple</code> — immutable sibling of a mutable collection."]
      },
      "Bytearray vs Bytes": {
        section: "Data Structures & Internals",
        definition: "<code>bytes</code> is an immutable sequence of integers in the range 0–255, used to represent binary data. <code>bytearray</code> is a mutable sequence of the same integers — it supports in-place modification of individual bytes.",
        internal_working: "<code>bytes</code> objects are immutable like strings — operations that appear to modify them (like <code>b + b'x'</code>) create new objects. <code>bytearray</code> is backed by a resizable C array, allowing in-place assignment (<code>buf[0] = 0xFF</code>) and methods like <code>append</code>, <code>extend</code>. <code>bytes</code> are hashable and can be dict keys; <code>bytearray</code> cannot.",
        use_case: "Use <code>bytes</code> for fixed binary data: file contents, network packets, hash digests. Use <code>bytearray</code> when you need to build or modify binary data incrementally: constructing binary protocol frames, modifying image pixel data without creating many intermediate copies.",
        key_points: ["<code>bytes</code> is hashable (can be a dict key); <code>bytearray</code> is not.", "<code>bytearray</code> is more memory-efficient when building binary data incrementally — avoids O(n²) behaviour of bytes concatenation in a loop.", "Both can be decoded to strings: <code>b'hello'.decode('utf-8')</code>; strings encode to bytes: <code>'hello'.encode('utf-8')</code>.", "<code>memoryview</code> provides a zero-copy view over <code>bytes</code>, <code>bytearray</code>, or any buffer protocol object.", "Converting: <code>bytearray(b'hello')</code> makes a mutable copy; <code>bytes(bytearray_obj)</code> makes an immutable copy."]
      },
      "Range vs List": {
        section: "Data Structures & Internals",
        definition: "<code>range</code> is an immutable, lazy sequence representing an arithmetic progression — it stores only start, stop, and step values and computes elements on demand. A <code>list</code> stores all its elements explicitly in memory.",
        internal_working: "A <code>range</code> object in Python 3 is O(1) in memory regardless of its size — it only stores 3 integers. Membership testing (<code>n in range(...))</code> is also O(1) — computed arithmetically. A <code>list(range(n))</code> creates all <code>n</code> integers in memory as Python objects — O(n) space. In Python 2, <code>range()</code> returned a list; <code>xrange()</code> was the lazy version (now default in Python 3).",
        use_case: "Use <code>range</code> in <code>for</code> loops: <code>for i in range(1_000_000)</code> — no memory overhead. Use <code>list(range(n))</code> only when you need the actual list (e.g., to index, shuffle, or modify it).",
        key_points: ["<code>range(1_000_000)</code> uses ~48 bytes; <code>list(range(1_000_000))</code> uses ~8 MB.", "<code>range</code> supports slicing: <code>range(10)[2:7]</code> returns another <code>range</code> object.", "<code>range</code> membership test is O(1): <code>999_999 in range(1_000_000)</code> does arithmetic, not iteration.", "<code>range</code> is reversible: <code>range(10, 0, -1)</code> counts down without creating a list.", "In Python 2, always use <code>xrange</code> in loops; in Python 3, <code>range</code> already is lazy."]
      },
      "MemoryView vs Bytes": {
        section: "Data Structures & Internals",
        definition: "<code>bytes</code> is an immutable binary sequence. <code>memoryview</code> is a zero-copy view into the memory of another buffer-protocol object (<code>bytes</code>, <code>bytearray</code>, NumPy arrays) — it allows slicing and access without copying the underlying data.",
        internal_working: "<code>memoryview</code> uses Python's buffer protocol (<code>Py_buffer</code>) to expose a shared pointer to the underlying memory with metadata (shape, strides, format). Slicing a <code>bytes</code> object copies data; slicing a <code>memoryview</code> creates a new view sharing the same memory. This is critical for performance when processing large binary buffers.",
        use_case: "Use <code>memoryview</code> for efficient binary processing: parsing network packets by slicing without copying (<code>mv[4:8]</code>), passing sub-buffers to C extensions, or implementing zero-copy I/O with <code>socket.recv_into(mv)</code>.",
        key_points: ["<code>memoryview</code> slicing is O(1) and zero-copy; <code>bytes</code> slicing is O(k) where k is the slice length.", "Use <code>memoryview(large_bytes)[start:end]</code> instead of <code>large_bytes[start:end]</code> to avoid copying in tight loops.", "<code>memoryview</code> works on any object implementing the buffer protocol: <code>bytes</code>, <code>bytearray</code>, <code>array.array</code>, NumPy arrays.", "Writeable memoryviews can be created from <code>bytearray</code>: <code>mv = memoryview(bytearray(...))</code>.", "<code>memoryview</code> objects must be released after use in some scenarios to avoid keeping large buffers alive."]
      },
      "Class vs Object": {
        section: "Object-Oriented Programming",
        definition: "A <strong>class</strong> is a blueprint or template that defines attributes and behaviours common to a category of objects. An <strong>object</strong> (instance) is a concrete realisation of a class — it is created by calling the class and has its own state stored in instance attributes.",
        internal_working: "A class is itself an object in Python (instance of <code>type</code> or a metaclass). When you call <code>MyClass()</code>, Python invokes <code>MyClass.__call__</code> which calls <code>__new__</code> to allocate memory (creating the instance), then <code>__init__</code> to initialise it. The instance's <code>__dict__</code> holds its attributes; the class's <code>__dict__</code> holds methods and class-level attributes. Attribute lookup follows the MRO.",
        use_case: "Define a class once: <code>class Car: def __init__(self, brand): self.brand = brand</code>. Create many instances: <code>car1 = Car('Toyota'); car2 = Car('BMW')</code>. Each instance has its own <code>brand</code> attribute.",
        key_points: ["Everything in Python is an object — even classes, functions, and modules.", "<code>type(obj)</code> returns the class that created the object; <code>isinstance(obj, cls)</code> checks inheritance too.", "<code>obj.__class__</code> references its class; <code>cls.__bases__</code> references its parent classes.", "Instance attributes are stored in <code>obj.__dict__</code>; class attributes are in <code>MyClass.__dict__</code>.", "You can add attributes to an instance dynamically: <code>obj.new_attr = value</code> — this modifies <code>obj.__dict__</code>."]
      },
      "Instance Variable vs Class Variable": {
        section: "Object-Oriented Programming",
        definition: "An <strong>instance variable</strong> is defined per-object (typically in <code>__init__</code> with <code>self.var = ...</code>) and holds data unique to each instance. A <strong>class variable</strong> is defined in the class body (outside any method) and is shared across all instances of the class.",
        internal_working: "Instance variables are stored in the instance's <code>__dict__</code>. Class variables are stored in the class's <code>__dict__</code>. Attribute lookup first checks <code>instance.__dict__</code>, then the class's <code>__dict__</code>, then base classes (MRO). If you assign to <code>self.class_var = value</code>, Python creates a new instance variable that shadows the class variable for that instance — it does not modify the class variable.",
        use_case: "Class variable: <code>class Employee: company = 'Acme'</code> — shared by all employees. Instance variable: <code>self.name = name</code> — unique per employee. Class variables are good for constants or counters: <code>Employee.count += 1</code>.",
        key_points: ["If a class variable is mutable (e.g., a list), modifying it via one instance affects all instances — a common bug.", "Assigning <code>self.class_var = new_value</code> creates a shadow instance variable — the class variable is unchanged.", "Access class variables via the class (<code>MyClass.var</code>), not via instances, to avoid shadowing confusion.", "Use class variables for constants, counters, or registry dicts shared across all instances.", "<code>__slots__</code> replaces per-instance <code>__dict__</code> with a fixed tuple of descriptors, reducing memory by ~30–50%."]
      },
      "Static Method vs Class Method": {
        section: "Object-Oriented Programming",
        definition: "A <strong>static method</strong> (<code>@staticmethod</code>) is a method that belongs to the class namespace but does not receive any implicit first argument — it's essentially a plain function inside a class. A <strong>class method</strong> (<code>@classmethod</code>) receives the class (<code>cls</code>) as its implicit first argument, not the instance.",
        internal_working: "Both are implemented using descriptors. <code>staticmethod</code> descriptor's <code>__get__</code> simply returns the wrapped function unbound. <code>classmethod</code> descriptor's <code>__get__</code> creates a bound method with the class passed as the first argument. When called via a subclass, <code>cls</code> is the subclass — enabling polymorphism at the class level.",
        use_case: "Static method: utility functions logically grouped with the class but needing no class/instance data: <code>@staticmethod def validate_age(age): return age > 0</code>. Class method: alternative constructors: <code>@classmethod def from_dict(cls, data): return cls(**data)</code>.",
        key_points: ["Use <code>@staticmethod</code> when the method doesn't need <code>self</code> or <code>cls</code> — it's just namespaced in the class.", "Use <code>@classmethod</code> for factory methods and alternative constructors, and when subclasses need polymorphic behaviour.", "<code>@classmethod</code> is inheritance-aware — calling it on a subclass passes the subclass as <code>cls</code>, not the base class.", "Both can be called on the class or an instance: <code>MyClass.method()</code> and <code>obj.method()</code> both work.", "Neither has access to instance state; classmethod has access to class state via <code>cls</code>."]
      },
      "Method Overloading vs Method Overriding": {
        section: "Object-Oriented Programming",
        definition: "<strong>Method overriding</strong> occurs when a subclass provides a new implementation for a method already defined in its parent class — same name, same (or compatible) signature, different behaviour. <strong>Method overloading</strong> means having multiple methods with the same name but different signatures — Python does not support this natively.",
        internal_working: "Python handles method calls via the MRO. When a method is called on an instance, Python searches the MRO in order — the first match wins. Overriding is natural: the subclass's method shadows the parent's. Since Python is dynamically typed, traditional overloading is unnecessary — a single method can handle different argument types/counts using <code>*args</code>, <code>isinstance</code>, or <code>functools.singledispatch</code>.",
        use_case: "Overriding: <code>class Animal: def speak(self): ...</code> → <code>class Dog(Animal): def speak(self): return 'Woof'</code>. Overloading simulation: <code>@singledispatch def process(arg): ...</code> with type-specific implementations registered.",
        key_points: ["Python does not support method overloading — defining two methods with the same name just replaces the first with the second.", "Use <code>functools.singledispatch</code> for type-based dispatch (closest Python equivalent to overloading).", "Call the parent method in an override with <code>super().method()</code> to extend rather than replace behaviour.", "<code>super()</code> in Python 3 uses the MRO to determine which parent method to call — crucial in multiple inheritance.", "Overriding is a key mechanism for polymorphism (runtime) — the same interface, different behaviour depending on the object type."]
      },
      "Inheritance vs Composition": {
        section: "Object-Oriented Programming",
        definition: "<strong>Inheritance</strong> models an 'is-a' relationship — a subclass inherits and extends a parent class's interface and implementation. <strong>Composition</strong> models a 'has-a' relationship — a class contains instances of other classes as attributes, delegating behaviour to them.",
        internal_working: "Inheritance creates a class hierarchy. Python resolves method calls via the C3 linearisation MRO. Composition simply stores object references in instance attributes — no MRO involved. Composition is implemented at runtime; inheritance is baked in at class definition time. Python supports multiple inheritance natively, which can create diamond problems handled by MRO.",
        use_case: "Inheritance: <code>class Dog(Animal)</code> — Dog is-an Animal. Composition: <code>class Car: def __init__(self): self.engine = Engine()</code> — Car has-an Engine. Prefer composition when you need flexibility to swap implementations at runtime.",
        key_points: ["Favour composition over inheritance (GoF principle) — composition is more flexible and avoids fragile base class problems.", "Deep inheritance hierarchies are hard to understand and maintain — keep hierarchies shallow.", "Composition allows swapping behaviour at runtime (strategy pattern); inheritance is fixed at class definition.", "Python supports multiple inheritance — use <code>super()</code> correctly and understand MRO (C3 linearisation).", "Mixins are a pragmatic middle ground — small classes providing specific functionality mixed into other classes via multiple inheritance."]
      },
      "Encapsulation vs Abstraction": {
        section: "Object-Oriented Programming",
        definition: "<strong>Encapsulation</strong> is the bundling of data (attributes) and methods that operate on that data within a class, and restricting direct access to internal state. <strong>Abstraction</strong> is hiding complex implementation details and exposing only a clean, simple interface.",
        internal_working: "Python enforces encapsulation by convention using name mangling: attributes prefixed with <code>__</code> (double underscore) are renamed to <code>_ClassName__attr</code> by the interpreter, making them harder (but not impossible) to access. Abstraction in Python is typically achieved through abstract base classes (<code>abc.ABC</code>) which define interface contracts without implementing them.",
        use_case: "Encapsulation: a <code>BankAccount</code> class hides <code>__balance</code> and exposes <code>deposit()</code>/<code>withdraw()</code> methods. Abstraction: a <code>Shape</code> ABC defines <code>area()</code> without implementing it; concrete subclasses (<code>Circle</code>, <code>Square</code>) provide implementations.",
        key_points: ["Python's 'encapsulation' is by convention: single underscore <code>_attr</code> means 'protected' (internal use), double underscore <code>__attr</code> triggers name mangling.", "Name mangling is not true private — you can still access <code>obj._ClassName__attr</code> — it's a deterrent, not a lock.", "Abstraction reduces coupling — callers depend on the interface, not the implementation.", "Use <code>@property</code> to expose controlled access to private attributes with getter/setter logic.", "Abstract classes (<code>abc.ABC</code> with <code>@abstractmethod</code>) enforce that subclasses implement required methods."]
      },
      "Public vs Private vs Protected": {
        section: "Object-Oriented Programming",
        definition: "Python uses naming conventions (not keywords) for access control. <strong>Public</strong> attributes/methods (<code>name</code>) are accessible from anywhere. <strong>Protected</strong> (<code>_name</code>) signals internal use — accessible but by convention not to be used outside the class or subclasses. <strong>Private</strong> (<code>__name</code>) triggers name mangling to make external access harder.",
        internal_working: "Public: no modification. Protected: a naming convention only — no runtime enforcement. Private: the interpreter renames <code>__name</code> to <code>_ClassName__name</code> during class creation. This means <code>obj.__name</code> raises <code>AttributeError</code>, but <code>obj._ClassName__name</code> still works. Unlike Java/C++, there is no true access enforcement at the language level.",
        use_case: "Public: <code>user.name</code>. Protected: <code>self._cache = {}</code> — a hint to subclasses that they can use it. Private: <code>self.__secret_key = key</code> — a strong hint that this is truly internal, and name mangling prevents accidental overriding in subclasses.",
        key_points: ["Python's access control is 'we're all adults here' — conventions over enforcement; no <code>private</code> keyword.", "Single underscore <code>_x</code> is a convention meaning 'internal use' — widely respected in the Python community.", "Double underscore <code>__x</code> triggers name mangling: useful to avoid attribute name clashes in subclasses, not for security.", "Properties (<code>@property</code>, <code>@setter</code>) provide controlled public API over private backing attributes.", "<code>from module import *</code> skips names starting with <code>_</code> unless listed in <code>__all__</code>."]
      },
      "Abstract Class vs Interface": {
        section: "Object-Oriented Programming",
        definition: "An <strong>abstract class</strong> is a class that cannot be instantiated directly and may contain both abstract (unimplemented) methods and concrete (implemented) methods and state. An <strong>interface</strong> (in languages like Java) is a purely abstract contract with no implementation. Python does not have a built-in <code>interface</code> keyword — abstract classes via <code>abc.ABC</code> serve both purposes.",
        internal_working: "Python's <code>abc.ABC</code> uses a metaclass <code>ABCMeta</code>. Methods decorated with <code>@abstractmethod</code> are registered; the metaclass's <code>__call__</code> raises <code>TypeError</code> if any abstract method is unimplemented when trying to instantiate. Python also supports virtual subclasses via <code>ABC.register(cls)</code> — letting a class pass isinstance checks without inheritance.",
        use_case: "Define a plugin interface: <code>class Notifier(ABC): @abstractmethod def send(self, msg): pass</code>. Subclasses <code>EmailNotifier</code>, <code>SMSNotifier</code> implement <code>send</code>. Forces all implementations to honour the contract.",
        key_points: ["Attempting to instantiate an ABC with unimplemented abstract methods raises <code>TypeError</code>.", "ABCs can have concrete methods (with implementation), unlike a pure interface.", "Python uses duck typing so formal interfaces via ABC are optional — but they improve clarity and catch errors early.", "<code>@abstractmethod</code> can be combined with <code>@property</code>, <code>@staticmethod</code>, or <code>@classmethod</code>.", "<code>isinstance(obj, ABC)</code> returns <code>True</code> for registered virtual subclasses too — useful for third-party class integration."]
      },
      "`__str__` vs `__repr__`": {
        section: "Object-Oriented Programming",
        definition: "<code>__repr__</code> returns an unambiguous, developer-facing string representation of an object — ideally one that could recreate the object. <code>__str__</code> returns a human-readable, user-facing string. If <code>__str__</code> is not defined, Python falls back to <code>__repr__</code>.",
        internal_working: "<code>str(obj)</code> calls <code>obj.__str__()</code>; <code>repr(obj)</code> calls <code>obj.__repr__()</code>. In an interactive REPL, Python displays <code>repr()</code>. <code>print(obj)</code> uses <code>str()</code>. Inside f-strings, <code>f'{obj}'</code> uses <code>__str__</code>; <code>f'{obj!r}'</code> uses <code>__repr__</code>. Collections (<code>list</code>, <code>dict</code>) always use <code>repr()</code> for their elements even in <code>str()</code> context.",
        use_case: "<code>__repr__</code>: <code>def __repr__(self): return f\"Point(x={self.x}, y={self.y})\"</code> — evaluatable. <code>__str__</code>: <code>def __str__(self): return f\"({self.x}, {self.y})\"</code> — friendly display.",
        key_points: ["Always implement <code>__repr__</code> — it's the fallback when <code>__str__</code> is missing.", "<code>__repr__</code> should ideally return a string that <code>eval()</code>s back to an equal object.", "REPL output and list displays use <code>repr()</code>; <code>print()</code> and <code>str()</code> use <code>__str__</code>.", "Use <code>!r</code> in f-strings to force <code>repr</code>: <code>f'{obj!r}'</code> — useful for debugging.", "<code>dataclasses</code> auto-generates <code>__repr__</code> by default."]
      },
      "`__new__` vs `__init__`": {
        section: "Object-Oriented Programming",
        definition: "<code>__new__</code> is the static method that actually creates and returns a new instance of the class — it controls object creation (allocation). <code>__init__</code> is called after <code>__new__</code> to initialise the newly created instance — it controls object initialisation.",
        internal_working: "When you call <code>MyClass(args)</code>, Python first calls <code>MyClass.__new__(MyClass, args)</code> which allocates memory and returns an instance. If the returned object is an instance of <code>MyClass</code>, Python then calls <code>instance.__init__(args)</code>. <code>__new__</code> must return the instance; <code>__init__</code> must return <code>None</code>. For immutable types (<code>int</code>, <code>str</code>, <code>tuple</code>), value must be set in <code>__new__</code> since they can't be modified after allocation.",
        use_case: "Override <code>__new__</code> for singletons: <code>def __new__(cls): if not cls._instance: cls._instance = super().__new__(cls); return cls._instance</code>. Override it for custom metaclasses or to return different types. Use <code>__init__</code> for standard object setup.",
        key_points: ["<code>__new__</code> must return an instance; if it returns a non-instance, <code>__init__</code> is not called.", "For immutable types like <code>int</code>, customise via <code>__new__</code>: <code>class PositiveInt(int): def __new__(cls, v): if v <= 0: raise ValueError; return super().__new__(cls, v)</code>.", "Most classes only need <code>__init__</code>; override <code>__new__</code> only for singleton, metaclass, or immutable type patterns.", "<code>__init__</code> returns <code>None</code> by convention — returning anything else raises a <code>TypeError</code>.", "Metaclasses use <code>__new__</code> to customise class creation itself."]
      },
      "Iterable vs Iterator": {
        section: "Iteration & Comprehensions",
        definition: "An <strong>iterable</strong> is any object that implements <code>__iter__()</code> and returns an iterator. An <strong>iterator</strong> is an object that implements both <code>__iter__()</code> (returning itself) and <code>__next__()</code> (returning the next value or raising <code>StopIteration</code>). All iterators are iterables, but not all iterables are iterators.",
        internal_working: "When a <code>for</code> loop starts, Python calls <code>iter(obj)</code> to get an iterator, then repeatedly calls <code>next(iterator)</code>. A list is an iterable: <code>iter([1,2,3])</code> returns a <code>list_iterator</code> object which tracks a current index. The list itself is not an iterator — it cannot be advanced with <code>next()</code>. Generators are both iterables and iterators.",
        use_case: "Iterable: a list, string, dict, file — you can loop over them. Iterator: the result of <code>iter(list)</code>, <code>open('file')</code>, <code>map(fn, seq)</code> — stateful, consumed once. Implement the iterator protocol for custom lazy sequences.",
        key_points: ["<code>iter(obj)</code> calls <code>obj.__iter__()</code>; <code>next(it)</code> calls <code>it.__next__()</code>.", "Iterables can be looped multiple times (list, tuple); iterators are exhausted after one pass and raise <code>StopIteration</code> thereafter.", "A generator function/expression returns an object that is both an iterable and an iterator.", "File objects returned by <code>open()</code> are iterators — you can call <code>next(f)</code> to get the next line.", "Implement the iterator protocol in custom classes with <code>__iter__(self)</code> and <code>__next__(self)</code>."]
      },
      "Iterator vs Generator": {
        section: "Iteration & Comprehensions",
        definition: "An <strong>iterator</strong> is any object implementing <code>__iter__</code> and <code>__next__</code>. A <strong>generator</strong> is a special kind of iterator created automatically by a generator function (using <code>yield</code>) or a generator expression — it implements the iterator protocol implicitly and its state is maintained in the suspended function frame.",
        internal_working: "A custom iterator class must manually maintain state in instance attributes and implement <code>__next__</code>. A generator function's frame is automatically suspended at each <code>yield</code> with all local variables intact, and resumed on the next <code>next()</code> call. Generators are more concise and automatic — CPython creates a <code>PyGenObject</code> that wraps the code frame.",
        use_case: "Custom iterator for complex stateful iteration: class with <code>__iter__</code>/<code>__next__</code>. Generator for simpler lazy sequences: <code>def evens(n): for i in range(0, n, 2): yield i</code>. Generators are idiomatic Python for lazy evaluation.",
        key_points: ["All generators are iterators; not all iterators are generators.", "Generators are far more concise than equivalent iterator classes — prefer generators for most use cases.", "Generator expressions (<code>(x*2 for x in range(10))</code>) are memory-efficient one-liners.", "Calling <code>next()</code> on an exhausted generator raises <code>StopIteration</code>; for a custom iterator, you implement this yourself.", "<code>yield from iterable</code> delegates iteration to a sub-generator, flattening nested generators."]
      },
      "List Comprehension vs Generator Expression": {
        section: "Iteration & Comprehensions",
        definition: "A <strong>list comprehension</strong> (<code>[expr for x in iterable]</code>) immediately evaluates and stores all results in a list in memory. A <strong>generator expression</strong> (<code>(expr for x in iterable)</code>) returns a lazy generator that computes each value on demand, using O(1) memory.",
        internal_working: "List comprehensions are executed eagerly — every element is computed and the result is a fully populated <code>list</code> object. Generator expressions produce a generator object; each call to <code>next()</code> executes the expression for the next element. Syntactically they differ only in delimiter: <code>[]</code> vs <code>()</code>.",
        use_case: "List comprehension when you need the full result multiple times or need random access: <code>squares = [x**2 for x in range(100)]</code>. Generator expression for one-time iteration or passing to aggregating functions: <code>total = sum(x**2 for x in range(1_000_000))</code> — no list created.",
        key_points: ["Generator expressions use O(1) memory; list comprehensions use O(n) memory.", "When passing to <code>sum()</code>, <code>max()</code>, <code>any()</code>, <code>all()</code> — prefer generator expression; the extra <code>()</code> is not needed inside these calls.", "List comprehensions can be indexed (<code>result[i]</code>); generator expressions cannot.", "Generator expressions are slightly slower per element due to frame suspension overhead; list comprehensions may be faster when you need all elements.", "Nested generators are evaluated lazily, which can save significant memory for large cartesian products."]
      },
      "`map()` vs List Comprehension": {
        section: "Iteration & Comprehensions",
        definition: "<code>map(func, iterable)</code> applies a function to every element of an iterable and returns a lazy map object (iterator). A list comprehension (<code>[expr for x in iterable]</code>) applies an expression to every element and returns a list. Both transform collections.",
        internal_working: "In Python 3, <code>map()</code> returns a <code>map</code> iterator object — lazy, not computed until iterated. It avoids Python-level looping by calling the function (which may be a C function) for each element. List comprehensions are compiled to optimised bytecode using <code>LIST_APPEND</code>. For Python functions, list comprehension performance is similar or better; for built-in C functions, <code>map</code> can be faster.",
        use_case: "<code>map(str, numbers)</code> — clean when using a named function. <code>[str(n) for n in numbers]</code> — more readable with expressions: <code>[n * 2 + 1 for n in numbers]</code>. Prefer list comprehension for readability in most cases.",
        key_points: ["<code>map()</code> in Python 3 is lazy (returns an iterator); wrap with <code>list()</code> if you need a list.", "List comprehensions are generally preferred in Python for readability (PEP 8).", "<code>map()</code> with a built-in C function (<code>map(int, strings)</code>) can be faster than a list comprehension calling the same function.", "List comprehensions support filtering inline: <code>[x for x in data if x > 0]</code>; <code>map</code> needs <code>filter</code> for this.", "Avoid <code>map(lambda x: ..., seq)</code> — a list comprehension is always cleaner in that case."]
      },
      "`filter()` vs List Comprehension": {
        section: "Iteration & Comprehensions",
        definition: "<code>filter(func, iterable)</code> returns an iterator of elements for which <code>func</code> returns <code>True</code>. A list comprehension with a condition (<code>[x for x in iterable if condition(x)]</code>) achieves the same but returns a list directly and is generally preferred for readability.",
        internal_working: "<code>filter()</code> in Python 3 is a lazy iterator — elements are evaluated one-by-one as requested. If <code>func</code> is <code>None</code>, it filters out falsy values. List comprehension with a condition is compiled to bytecode using <code>JUMP_IF_FALSE</code> to skip non-matching elements. Both are O(n) time.",
        use_case: "<code>filter(None, values)</code> is a concise way to remove falsy values (None, 0, '', []). <code>evens = [x for x in nums if x % 2 == 0]</code> is cleaner with a condition expression. Prefer list comprehension for most filtering tasks.",
        key_points: ["<code>filter(None, iterable)</code> removes all falsy values — a handy idiom.", "<code>filter()</code> returns a lazy iterator in Python 3; use <code>list(filter(...))</code> to get a list.", "List comprehension with a condition is more Pythonic and readable for most filtering.", "<code>filter</code> cannot transform elements; for transform+filter, a list comprehension or <code>map(f, filter(...))</code> is needed.", "For large datasets and one-time iteration, <code>filter()</code>'s laziness saves memory vs a list comprehension."]
      },
      "`zip()` vs `enumerate()`": {
        section: "Iteration & Comprehensions",
        definition: "<code>zip(*iterables)</code> combines multiple iterables element-wise, yielding tuples of corresponding elements. <code>enumerate(iterable, start=0)</code> wraps an iterable and yields <code>(index, element)</code> tuples. Both return lazy iterators.",
        internal_working: "<code>zip</code> internally holds iterators for each input and calls <code>next()</code> on all of them per iteration step — it stops at the shortest input. <code>enumerate</code> maintains a counter and pairs it with each element. Both are implemented in C and are lazy (Python 3). <code>zip_longest</code> in <code>itertools</code> pads shorter iterables.",
        use_case: "<code>zip</code>: pairing two lists — <code>for name, score in zip(names, scores)</code>. <code>enumerate</code>: getting index in a loop — <code>for i, item in enumerate(items)</code> instead of <code>for i in range(len(items))</code>.",
        key_points: ["Always use <code>enumerate()</code> instead of <code>range(len(iterable))</code> — it's more Pythonic and avoids index-off-by-one errors.", "<code>zip</code> silently stops at the shortest iterable — use <code>itertools.zip_longest</code> to pad.", "<code>dict(zip(keys, values))</code> is a clean one-liner to create a dict from two lists.", "<code>enumerate(seq, start=1)</code> starts counting from 1 — useful for 1-indexed display.", "Unzipping: <code>cols = list(zip(*rows))</code> transposes a matrix."]
      },
      "`range()` vs `xrange()` (Py2)": {
        section: "Iteration & Comprehensions",
        definition: "In Python 2, <code>range()</code> returned a fully populated list, while <code>xrange()</code> returned a lazy iterator-like object computing values on demand. In Python 3, <code>range()</code> is the lazy version (equivalent to Python 2's <code>xrange</code>) and <code>xrange</code> no longer exists.",
        internal_working: "Python 3's <code>range</code> object stores only start, stop, and step — three integers. Membership testing (<code>n in range()</code>) is O(1) arithmetic. Slicing a <code>range</code> returns another <code>range</code>. Python 2's <code>range()</code> allocated a full list — using it with large numbers (e.g., <code>range(10**7)</code>) in loops was a memory trap.",
        use_case: "Python 3: just use <code>range()</code> everywhere. Python 2 legacy code: always prefer <code>xrange()</code> in loops — <code>for i in xrange(10**6)</code> is O(1) memory vs <code>range()</code>'s O(n). In Python 2 codebases being ported, this is a common migration point.",
        key_points: ["Python 3's <code>range</code> is already lazy — no <code>xrange</code> needed.", "Python 2's <code>range(n)</code> creates a list of n integers — never use for large n in loops.", "<code>range</code> objects are not generators — they can be iterated multiple times unlike generators.", "<code>six.moves.range</code> is a compatibility shim that maps to <code>xrange</code> in Py2 and <code>range</code> in Py3.", "Memory: <code>range(10**8)</code> in Python 3 uses ~48 bytes; in Python 2 it would need ~800 MB."]
      },
      "For loop vs While loop": {
        section: "Iteration & Comprehensions",
        definition: "A <strong>for loop</strong> iterates over an iterable a definite number of times, delegating iteration control to the iterator protocol. A <strong>while loop</strong> executes a block repeatedly as long as a boolean condition remains <code>True</code>, giving full control over loop progression.",
        internal_working: "A <code>for</code> loop internally calls <code>iter()</code> on the iterable then calls <code>next()</code> in a bytecode loop (<code>FOR_ITER</code>) until <code>StopIteration</code>. A <code>while</code> loop evaluates the condition expression each iteration and jumps back to the start if <code>True</code>. Both compile to bytecode jump instructions.",
        use_case: "For loop: iterating collections, fixed ranges, unpacking: <code>for user in users</code>. While loop: unknown iteration count, polling, game loops, reading until EOF: <code>while line := f.readline()</code>.",
        key_points: ["Prefer <code>for</code> over <code>while</code> whenever you're iterating over a sequence — it's safer and more Pythonic.", "While loops are prone to infinite loops if the condition is never updated — always ensure the terminating condition is reachable.", "For loops in Python cannot skip elements mid-iteration; use <code>continue</code> to skip or restructure with an iterator.", "<code>for...else</code> and <code>while...else</code>: the <code>else</code> block runs if the loop completes without a <code>break</code> — useful for search patterns.", "Walrus operator in while: <code>while chunk := file.read(4096)</code> is an idiomatic Python 3.8+ pattern."]
      },
      "Nested Loop vs Comprehension": {
        section: "Iteration & Comprehensions",
        definition: "A <strong>nested loop</strong> is two or more <code>for</code>/<code>while</code> loops where the inner loop runs completely for each iteration of the outer loop. A <strong>nested comprehension</strong> is a list/generator comprehension with multiple <code>for</code> clauses, which is syntactic sugar for nested loops.",
        internal_working: "A nested list comprehension <code>[x+y for x in a for y in b]</code> compiles to bytecode equivalent to nested <code>for</code> loops with <code>LIST_APPEND</code>. Comprehensions run in their own scope (a nested function in CPython). For most use cases their performance is similar, but comprehensions avoid building intermediate lists and are generally faster for simple transformations.",
        use_case: "Cartesian product: <code>pairs = [(x,y) for x in A for y in B]</code>. Flattening: <code>flat = [x for row in matrix for x in row]</code>. For complex logic with multiple statements, use explicit nested loops for clarity.",
        key_points: ["The order of <code>for</code> clauses in a comprehension mirrors the order of nested loops (outermost to innermost).", "Deeply nested comprehensions hurt readability — if you need 3+ levels, use explicit loops.", "Use <code>itertools.product(A, B)</code> for Cartesian products — more readable than nested comprehensions.", "Comprehensions create a new scope in Python 3 (variables don't leak); explicit loops do not create a new scope.", "For flattening, <code>itertools.chain.from_iterable(matrix)</code> is the most memory-efficient option."]
      },
      "Lazy Evaluation vs Eager Evaluation": {
        section: "Iteration & Comprehensions",
        definition: "<strong>Eager evaluation</strong> computes results immediately when an expression is encountered. <strong>Lazy evaluation</strong> defers computation until the result is actually needed, often processing one element at a time.",
        internal_working: "Python's default is eager — expressions are evaluated immediately. Lazy evaluation is achieved explicitly through generators, iterators, and <code>functools.lazy_*</code> patterns. Generators suspend at <code>yield</code> and resume only when <code>next()</code> is called. Python doesn't implement lazy evaluation at the language level (unlike Haskell) — you opt in via the iterator protocol.",
        use_case: "Lazy: <code>gen = (x**2 for x in range(10**9))</code> — no computation until iterated. Eager: <code>lst = [x**2 for x in range(1000)]</code>. Use lazy evaluation when data is large or potentially infinite, or when not all elements may be needed.",
        key_points: ["Generators, map, filter, zip, and range are lazy in Python 3 — they produce values on demand.", "Lazy evaluation enables working with infinite sequences: <code>itertools.count()</code>, <code>itertools.cycle()</code>.", "Short-circuit operators (<code>and</code>, <code>or</code>) are lazy — they don't evaluate the second operand if unnecessary.", "Chaining lazy operations forms a pipeline that processes one element through all steps before moving to the next — memory efficient.", "Eager evaluation can be more predictable and simpler to debug; lazy evaluation can mask errors until values are consumed."]
      },
      "Exception vs Error": {
        section: "Error Handling & Debugging",
