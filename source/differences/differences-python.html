        use_case: "REST: simple CRUD APIs, public APIs with stable contracts, caching (GET requests are cacheable by default). GraphQL: mobile apps needing bandwidth efficiency, complex data graphs (social networks), APIs consumed by multiple frontend clients with different data needs.",
        key_points: ["REST over-fetches (returns unused fields) or under-fetches (requires multiple calls); GraphQL solves both.", "GraphQL has a strong type system and is self-documenting via introspection.", "REST is simpler to cache (HTTP caching for GET); GraphQL POST requests are harder to cache.", "N+1 problem in GraphQL resolvers — use DataLoader (batching) to avoid N database calls per query.", "For Python: FastAPI or Flask for REST; Strawberry or Ariadne for GraphQL."]
      },
      "Kafka vs RabbitMQ": {
        section: "Advanced Python & Ecosystem",
        definition: "<strong>Apache Kafka</strong> is a distributed event streaming platform — a persistent, replayable, high-throughput log of messages. <strong>RabbitMQ</strong> is a traditional message broker using AMQP — messages are routed through exchanges to queues and deleted once consumed.",
        internal_working: "Kafka: messages written to append-only partitioned logs stored on disk. Consumers track their own offset — they can replay, reprocess, or join late. Retention is time-based (not consumer acknowledgment). Very high throughput (millions/sec). RabbitMQ: messages pushed to consumers, acknowledged, then deleted. Supports complex routing (fanout, topic, direct exchanges). Push model with acknowledgments.",
        use_case: "Kafka: event sourcing, audit logs, real-time analytics, microservice event bus where replay is needed. RabbitMQ: task queues, job dispatching, RPC patterns, any scenario where message delivery guarantees and routing flexibility matter.",
        key_points: ["Kafka is a log, not a queue — messages persist and can be replayed; RabbitMQ messages are deleted after consumption.", "Kafka consumer groups allow multiple consumers to share work across partitions (like competing consumers).", "RabbitMQ is easier to set up and reason about for simple task queues; Kafka has higher operational complexity.", "For Python: <code>confluent-kafka</code> or <code>kafka-python</code> for Kafka; <code>pika</code> or <code>aio-pika</code> for RabbitMQ.", "Kafka enables the event-sourcing pattern — the log is the source of truth; RabbitMQ is more suited to traditional messaging workflows."]
      }
    };

    const SECTIONS = [
      { name: "Core Python Basics", items: ["Shallow Copy vs Deep Copy", "List vs Tuple", "List vs Set", "List vs Dictionary", "Set vs Dictionary", "Mutable vs Immutable", "`is` vs `==`", "`append()` vs `extend()`", "`remove()` vs `pop()`", "`del` vs `remove()`"] },
      { name: "Functions & Arguments", items: ["`*args` vs `**kwargs`", "Positional vs Keyword Arguments", "Default vs Non-default Arguments", "Lambda vs Normal Function", "Recursive vs Iterative Function", "Generator vs Function", "Yield vs Return", "Higher-order Function vs Normal Function", "Pure Function vs Impure Function", "Function vs Method"] },
      { name: "Data Structures & Internals", items: ["List vs NumPy Array", "Array vs Linked List", "Stack vs Queue", "Queue vs Deque", "Heap vs Stack Memory", "OrderedDict vs Dict", "FrozenSet vs Set", "Bytearray vs Bytes", "Range vs List", "MemoryView vs Bytes"] },
      { name: "Object-Oriented Programming", items: ["Class vs Object", "Instance Variable vs Class Variable", "Static Method vs Class Method", "Method Overloading vs Method Overriding", "Inheritance vs Composition", "Encapsulation vs Abstraction", "Public vs Private vs Protected", "Abstract Class vs Interface", "`__str__` vs `__repr__`", "`__new__` vs `__init__`"] },
      { name: "Iteration & Comprehensions", items: ["Iterable vs Iterator", "Iterator vs Generator", "List Comprehension vs Generator Expression", "`map()` vs List Comprehension", "`filter()` vs List Comprehension", "`zip()` vs `enumerate()`", "`range()` vs `xrange()` (Py2)", "For loop vs While loop", "Nested Loop vs Comprehension", "Lazy Evaluation vs Eager Evaluation"] },
      { name: "Error Handling & Debugging", items: ["Exception vs Error", "Try vs Finally", "Raise vs Assert", "Compile-time vs Runtime Error", "Logging vs Print", "Debugging vs Testing", "Unit Test vs Integration Test", "Mock vs Stub", "Assertion vs Exception Handling", "Stack Trace vs Error Message"] },
      { name: "Memory Management & Performance", items: ["Stack vs Heap Memory", "Reference vs Value", "Garbage Collection vs Manual Memory", "Shallow vs Deep Comparison", "Copy vs Assignment", "Interning vs Normal Objects", "Pass by Value vs Pass by Reference", "CPU-bound vs IO-bound", "Time Complexity vs Space Complexity", "Caching vs Memoization"] },
      { name: "Concurrency & Parallelism", items: ["Multithreading vs Multiprocessing", "Concurrency vs Parallelism", "Thread vs Process", "GIL vs No-GIL", "Sync vs Async", "Blocking vs Non-blocking", "Thread Pool vs Process Pool", "Asyncio vs Threading", "Future vs Promise", "Event Loop vs Thread Loop"] },
      { name: "File Handling & Serialization", items: ["Pickle vs JSON", "Read vs Write Mode", "Binary vs Text Mode", "CSV vs JSON", "Serialization vs Deserialization", "File vs Stream", "Buffered vs Unbuffered IO", "Local Storage vs Cloud Storage", "File System vs Database", "Structured vs Unstructured Data"] },
      { name: "Advanced Python & Ecosystem", items: ["Pandas DataFrame vs PySpark DataFrame", "SQL vs NoSQL", "ORM vs Raw SQL", "API vs Microservice", "Monolith vs Microservices", "Batch Processing vs Stream Processing", "ETL vs ELT", "Docker vs Virtual Machine", "REST vs GraphQL", "Kafka vs RabbitMQ"] }
    ];

    const SECTION_COLORS = ['#7c6af7', '#5eead4', '#f472b6', '#60a5fa', '#4ade80', '#fbbf24', '#f87171', '#a78bfa', '#34d399', '#fb923c'];
    let activeBtn = null;

    function buildSidebar() {
      const container = document.getElementById('sidebarSections');
      SECTIONS.forEach((sec, si) => {
        const section = document.createElement('div');
        section.className = 'section-group';

        const title = document.createElement('div');
        title.className = 'section-title collapsed';
        title.innerHTML = `<span class="arrow">▶</span> ${sec.name}`;
        title.addEventListener('click', () => {
          title.classList.toggle('collapsed');
          items.classList.toggle('hidden');
        });

        const items = document.createElement('div');
        items.className = 'section-items hidden';
        sec.items.forEach((item, ii) => {
          const tag = document.createElement('button');
          tag.className = 'topic-tag';
          tag.dataset.item = item;
          tag.textContent = `${ii + 1}. ${item.replace(/`/g, '')}`;
          tag.addEventListener('click', () => showExplanation(item, tag));
          items.appendChild(tag);
        });

        section.appendChild(title);
        section.appendChild(items);
        container.appendChild(section);
      });
    }

    function filterItems(q) {
      q = q.toLowerCase();
      document.querySelectorAll('.topic-tag').forEach(tag => {
        tag.style.display = tag.dataset.item.toLowerCase().includes(q) ? '' : 'none';
      });
      document.querySelectorAll('.section-group').forEach(group => {
        const anyVisible = [...group.querySelectorAll('.topic-tag')].some(t => t.style.display !== 'none');
        group.style.display = anyVisible ? '' : 'none';
        if (q) { group.querySelector('.section-title').classList.remove('collapsed'); group.querySelector('.section-items').classList.remove('hidden'); }
      });
    }

    function showExplanation(item, btn) {
      if (activeBtn) activeBtn.classList.remove('active');
      activeBtn = btn;
      btn.classList.add('active');
      document.getElementById('welcomeState').style.display = 'none';
      document.getElementById('explanationPanel').style.display = 'block';
      const d = DATA[item];
      if (!d) { document.getElementById('contentArea').innerHTML = '<p>No data found.</p>'; return; }
      const cleanItem = item.replace(/`/g, '');
      document.getElementById('contentArea').innerHTML = `
        <h2 style="font-size:1.4rem;font-weight:700;color:var(--color-text);margin:0 0 0.5rem;font-family:'Sora',sans-serif;">${cleanItem}</h2>
        <span style="font-size:0.75rem;font-family:'JetBrains Mono',monospace;background:rgba(15,139,139,0.1);border:1px solid rgba(15,139,139,0.25);color:var(--color-accent);padding:3px 10px;border-radius:20px;">${d.section}</span>
        <div class="explanation-card" style="margin-top:1.5rem;">
          <h3>📘 Definition</h3>
          <p>${d.definition}</p>
        </div>
        <div class="explanation-card">
          <h3>⚙️ Internal Working</h3>
          <p>${d.internal_working}</p>
        </div>
        <div class="explanation-card">
          <h3>🎯 Use Case</h3>
          <p>${d.use_case}</p>
        </div>
        <div class="explanation-card">
          <h3>📋 Key Points for Interviewer</h3>
          <ul>${d.key_points.map(p => `<li>${p}</li>`).join('')}</ul>
        </div>`;
      document.getElementById('mainPanel').scrollTop = 0;
    }

    buildSidebar();

    // Auto-select first item from first section
    const firstSection = document.querySelector('.section-group');
    if (firstSection) {
      firstSection.querySelector('.section-title').classList.remove('collapsed');
      firstSection.querySelector('.section-items').classList.remove('hidden');
      const firstTag = firstSection.querySelector('.topic-tag');
      if (firstTag) firstTag.click();
    }
  </script>
  <script src="../app.js"></script>
  <script src="../hierarchy.js"></script>
  <script src="../sidebar-nav.js"></script>
