<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libraries | Data Sheets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="../shared.css" />
  <style>
    /* Page-specific styles only */
  </style>
</head>
<body>
  <header class="top-nav">
    <div class="top-nav-inner">
      <div class="brand">
        <a href="../../index.html" class="brand">
        <div class="brand-icon">
          <span class="material-symbols-outlined">architecture</span>
        </div>
        <span class="brand-text">Data Sheets</span>
      </a>
      </div>
      <div class="nav-right">
        <button class="nav-icon-btn" id="themeToggle" onclick="toggleTheme()">
          <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
        </button>
        <div class="user-avatar">
          <img src="../../assets/images/profile-pic.jpeg" alt="User profile" />
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <header class="page-header">
      <p class="eyebrow">Libraries</p>
      <h1>Libraries</h1>
      <p>Essential Python libraries for data manipulation, analysis, and visualization.</p>
    </header>

    <div class="track-grid">
      <a href="libraries-hub.html" class="track">
        <span class="material-symbols-outlined" style="font-size: 28px; color: var(--primary); margin-bottom: 0.5rem;">extension</span>
        <h3>Libraries Hub</h3>
        <p>Central hub for all data libraries and tools</p>
      </a>
    </div>

    <footer class="footer">
      <span class="footer-brand">Data Sheets</span>
      <div class="footer-links">
        <a href="../../index.html">Home</a>
        <a href="../portfolios/portfolio.html">Profile</a>
        <a href="../roadmaps/roadmap.html">Roadmap</a>
      </div>
    </footer>
  </main>

  <button id="scrollToTop" class="scroll-to-top" aria-label="Scroll to top">
    <span class="material-symbols-outlined">arrow_upward</span>
  </button>

  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') document.documentElement.classList.add('dark');
    })();
    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById('themeIcon');
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        icon.textContent = 'dark_mode';
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        icon.textContent = 'light_mode';
        localStorage.setItem('theme', 'dark');
      }
    }
    (function() {
      const saved = localStorage.getItem('theme');
      const icon = document.getElementById('themeIcon');
      icon.textContent = saved === 'dark' ? 'light_mode' : 'dark_mode';
    })();
    const stt = document.getElementById('scrollToTop');
    window.addEventListener('scroll', () => { stt.classList.toggle('visible', window.pageYOffset > 400); });
    stt.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>
</body>
</html>
