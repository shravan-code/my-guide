<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self-Taught Data Engineer | Shravan Kumar Tela</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../../styles.css" />

  <link rel="stylesheet" href="../../styles/mobile.css" />
  <link rel="stylesheet" href="../../sidebar-nav.css" />
  <style>
    @import url("../../design-tokens.css");

    main {
      width: min(1300px, calc(100% - 4rem));
      margin: 0 auto;
      padding: 1.5rem 0 3rem;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 2000;
      height: var(--topbar-height);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand-menu-wrapper {
      display: flex;
      align-items: center;
      flex: 1;
      gap: 3rem;
    }

    .brand {
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
      font-family: "Sora", sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--text);
      transition: color var(--transition);
      position: relative;
    }.brand-default,.brand:hover.brand:hover.header-actions {
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .home-link {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 0.4rem 1rem;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      transition: all var(--transition);
    }

    .home-link:hover {
      color: var(--text);
      background: var(--bg-alt);
      border-color: var(--glow-border);
    }

    /* Theme transition */
    .theme-transition-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .theme-transition-overlay.flash-light {
      background: radial-gradient(circle at center, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
      opacity: 1;
      animation: fadeOutUp 0.6s ease forwards;
    }

    .theme-transition-overlay.flash-dark {
      background: radial-gradient(circle at center, rgba(30,30,30,0.95) 0%, rgba(15,15,15,0) 70%);
      opacity: 1;
      animation: fadeOutDown 0.6s ease forwards;
    }

    @keyframes fadeOutUp {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.2); }
    }

    @keyframes fadeOutDown {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.2); }
    }

    body, .topbar, .glass, main, .bg-orb {
      transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
    }

    .bg-orb {
      transition: transform 0.6s, opacity 0.6s;
    }

    /* Theme Toggle */
    .theme-toggle {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(var(--glass-blur));
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      transition: all var(--transition);
      overflow: hidden;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      border-color: var(--glow-border);
    }

    .theme-icon-wrapper {
      position: relative;
      width: 20px;
      height: 20px;
      transition: transform 0.3s;
    }

    .theme-sun, .theme-moon {
      position: absolute;
      top: 0;
      left: 0;
      width: 20px;
      height: 20px;
      transition: all 0.4s ease;
    }

    .theme-sun {
      opacity: 1;
      transform: rotate(0deg) scale(1);
      stroke: #1a1a1a;
    }

    .theme-moon {
      opacity: 0;
      transform: rotate(-90deg) scale(0.5);
      stroke: #1a1a1a;
    }

    body.dark .theme-sun {
      opacity: 0;
      transform: rotate(90deg) scale(0.5);
    }

    body.dark .theme-moon {
      opacity: 1;
      transform: rotate(0deg) scale(1);
      stroke: #ffffff;
    }

    .theme-toggle svg {
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    /* Hamburger Button */
    .hamburger-btn {
      display: none;
      width: 40px;
      height: 40px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      z-index: 1000;
    }

    .hamburger-btn span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    .hamburger-btn.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }

    .hamburger-btn.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger-btn.active span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }

    .new-mobile-menu {
      display: none;
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--glass-border);
      padding: 1rem;
      z-index: 999;
    }

    .new-mobile-menu.show {
      display: block;
    }

    .new-mobile-nav {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .new-mobile-nav a {
      padding: 0.75rem 1rem;
      color: var(--text);
      text-decoration: none;
      border-radius: var(--radius-sm);
      background: var(--glass);
      border: 1px solid var(--glass-border);
    }

    @media (max-width: 920px) {
      .hamburger-btn {
        display: flex !important;
      }
    }

    /* Topbar layout */
    .topbar {
      display: flex !important;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: var(--topbar-height);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
      font-family: "Sora", sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--text);
      transition: color var(--transition);
      flex-shrink: 0;
    }.brand:hover.brand:hover.menu {
      display: flex;
      gap: 0.75rem;
      font-size: 0.9rem;
      font-weight: 500;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .menu a {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 0.5rem 0.9rem;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      background: transparent;
      transition: all var(--transition);
    }

    .menu a:hover {
      color: var(--text);
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
      border-color: var(--glow-border);
    }

    .menu a.active {
      color: var(--text);
      background: var(--bg-alt);
      border-color: var(--glow-border);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    /* Placeholder content */
    .placeholder-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 3rem 1rem;
    }

    .placeholder-content h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      margin: 0 0 1rem;
      font-family: "Sora", sans-serif;
      background: linear-gradient(135deg, var(--color-accent), #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .placeholder-content p {
      font-size: 1.1rem;
      color: var(--color-text-secondary);
      max-width: 500px;
      line-height: 1.6;
    }

    /* Scroll to top button */
    .scroll-to-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 44px;
      height: 44px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(var(--glass-blur));
      color: var(--text);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: all var(--transition);
      z-index: 1000;
      box-shadow: var(--shadow);
    }

    .scroll-to-top.visible {
      opacity: 1;
      visibility: visible;
      
    }

    .scroll-to-top:hover {
      background: var(--bg-alt);
      border-color: var(--glow-border);
      transform: translateY(-2px);
      box-shadow: var(--shadow), 0 0 20px rgba(99, 102, 241, 0.2);
    }

    .scroll-to-top svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      border-color: var(--glow-border);
      border-color: var(--glow-color);
      transform: translateY(-2px) scale(1.05);
    }

    .theme-toggle svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .toggle-text {
      display: none;
    }

    .hero {
      text-align: center;
      padding: 2.5rem 0 2rem;
      margin-bottom: 2rem;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      margin: 0 0 0.5rem;
      font-family: "Sora", sans-serif;
      background: linear-gradient(135deg, var(--glow-color), var(--glow-pink), var(--glow-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin: 1rem 0;
    }

    .subtitle span {
      padding: 0.3rem 0.8rem;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(236, 72, 153, 0.15));
      border: 1px solid var(--glow-border);
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
    }

    .summary {
      max-width: 700px;
      margin: 1.5rem auto 0;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    .section {
      margin: 3rem 0;
      padding: 2rem;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
    }

    .section h2 {
      font-size: 1.5rem;
      margin: 0 0 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--glow-border);
      background: linear-gradient(135deg, var(--glow-color), var(--glow-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .journey-grid {
      display: grid;
      gap: 1.5rem;
    }

    .journey-item {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    .journey-date {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--glow-color);
      padding: 0.5rem;
      background: rgba(99, 102, 241, 0.1);
      border-radius: var(--radius-sm);
      text-align: center;
    }

    .journey-content h3 {
      font-size: 1.1rem;
      margin: 0 0 0.5rem;
      color: var(--text);
    }

    .journey-content p {
      margin: 0;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .learning-path {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .path-card {
      padding: 1.25rem;
      background: var(--bg-alt);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      transition: all var(--transition);
    }

    .path-card:hover {
      border-color: var(--glow-color);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .path-card h4 {
      margin: 0 0 0.5rem;
      font-size: 1rem;
      color: var(--text);
    }

    .path-card p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .resources {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .resource-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      background: var(--bg-alt);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      text-decoration: none;
      color: var(--text);
      transition: all var(--transition);
    }

    .resource-item:hover {
      border-color: var(--glow-color);
      background: rgba(99, 102, 241, 0.05);
    }

    .resource-item svg {
      width: 20px;
      height: 20px;
      stroke: var(--glow-color);
      flex-shrink: 0;
    }

    .resource-item span {
      font-size: 0.9rem;
      font-weight: 500;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .skill-category {
      padding: 1.5rem;
      background: var(--bg-alt);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
    }

    .skill-category h4 {
      margin: 0 0 1rem;
      font-size: 1rem;
      color: var(--glow-color);
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .skill-tag {
      padding: 0.35rem 0.75rem;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid var(--glow-border);
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .tip-box {
      margin-top: 1.5rem;
      padding: 1.25rem;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.05));
      border: 1px solid var(--glow-border);
      border-radius: var(--radius-md);
    }

    .tip-box h4 {
      margin: 0 0 0.5rem;
      font-size: 0.95rem;
      color: var(--glow-color);
    }

    .tip-box p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      main {
        width: calc(100% - 2rem);
      }

      .hero {
        padding: 1.5rem 0;
      }

      .journey-item {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }

      .journey-date {
        text-align: left;
      }
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.5rem 1.5rem;
      background: var(--bg);
      border-top: 1px solid var(--glass-border);
      font-size: 0.8rem;
      color: var(--text-secondary);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      z-index: 100;
      height: 40px;
    }

    .experience-years strong {
      color: var(--glow-color);
      font-weight: 600;
    }
  </style>

</head>

  <main class="main-content">

  <main>
    <nav class="breadcrumb" aria-label="Breadcrumb">

  <script src="../../app.js"></script>
  <script>
    // Scroll to top button
    const scrollToTopBtn = document.createElement('button');
    scrollToTopBtn.id = 'scrollToTop';
    scrollToTopBtn.className = 'scroll-to-top';
    scrollToTopBtn.setAttribute('aria-label', 'Scroll to top');
    scrollToTopBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';
    document.body.appendChild(scrollToTopBtn);

    window.addEventListener('scroll', () => {
      if (window.pageYOffset > 300) {
        scrollToTopBtn.classList.add('visible');
      } else {
        scrollToTopBtn.classList.remove('visible');
      }
    });

    scrollToTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Career timer
    const careerTimer = document.getElementById('career-timer');
    if (careerTimer) {
      const startDate = new Date(2021, 10, 2);
      function updateCareerTimer() {
        const now = new Date();
        let years = now.getFullYear() - startDate.getFullYear();
        let months = now.getMonth() - startDate.getMonth();
        let days = now.getDate() - startDate.getDate();
        if (days < 0) {
          months--;
          const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
          days += prevMonth.getDate();
        }
        if (months < 0) {
          years--;
          months += 12;
        }
        careerTimer.textContent = years + ' years ' + months + ' months ' + days + ' days';
      }
      updateCareerTimer();
      setInterval(updateCareerTimer, 86400000);
    }
  </script>
<script src="../../hierarchy.js"></script>
